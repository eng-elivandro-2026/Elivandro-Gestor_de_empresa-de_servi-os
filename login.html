<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Sistema de Propostas</title>

  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#0d1117;
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      padding:16px;
    }

    .container{
      display:flex;
      width:900px;
      max-width:100%;
      background:#161b22;
      border:1px solid #30363d;
      border-radius:12px;
      overflow:hidden;
      box-shadow:0 10px 30px rgba(0,0,0,.35);
    }

    .left{
      flex:1;
      background:#0d1117;
      padding:30px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      border-right:1px solid #30363d;
    }

    .logo{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:20px;
    }

    .logo-mk{
      background:#facc15;
      color:#000;
      font-weight:bold;
      padding:10px 12px;
      border-radius:6px;
    }

    .logo-text{
      font-size:18px;
      font-weight:bold;
    }

    .logo-sub{
      font-size:12px;
      color:#8b949e;
    }

    .left h2{
      margin:20px 0 10px;
    }

    .left p{
      font-size:14px;
      color:#8b949e;
      line-height:1.6;
    }

    .right{
      flex:1;
      padding:30px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    h1{
      margin:0 0 20px;
    }

    input{
      width:100%;
      padding:12px;
      margin-bottom:10px;
      border:none;
      border-radius:8px;
      background:#21262d;
      color:#fff;
      font-size:16px;
      outline:none;
    }

    input:focus{
      outline:2px solid #58a6ff;
      outline-offset:1px;
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:8px;
      background:#58a6ff;
      color:#000;
      font-weight:bold;
      cursor:pointer;
      margin-top:5px;
      transition:opacity .2s ease;
    }

    button:hover{
      opacity:.92;
    }

    .btn-secondary{
      background:#30363d;
      color:#fff;
    }

    #msg{
      margin-top:12px;
      font-size:14px;
      color:#ff7b72;
      min-height:20px;
      line-height:1.4;
    }

    @media(max-width:768px){
      .container{
        flex-direction:column;
      }

      .left{
        border-right:none;
        border-bottom:1px solid #30363d;
      }

      .left,
      .right{
        padding:22px;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="left">
      <div class="logo">
        <div class="logo-mk">EE</div>
        <div>
          <div class="logo-text">Eng. Elivandro</div>
          <div class="logo-sub">Sistema de Propostas</div>
        </div>
      </div>

      <h2>Bem-vindo</h2>
      <p>Gerencie propostas, análises e pipeline da sua empresa em um único sistema.</p>
    </div>

    <div class="right">
      <h1>Entrar</h1>

      <input type="email" id="email" placeholder="Seu email" autocomplete="email" />
      <input type="password" id="senha" placeholder="Sua senha" autocomplete="current-password" />

      <button id="btnLogin">Entrar</button>
      <button id="btnCadastro" class="btn-secondary">Criar conta</button>
      <button id="btnReset" class="btn-secondary">Esqueci minha senha</button>

      <div id="msg"></div>
    </div>

  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js";

    const supabase = createClient(
      "https://ojuuzojwnyxdsavdosif.supabase.co",
      "sb_publishable_uqS8EZTOs5-sHKr1IpFhzg_eZrZOr7u"
    );

    const msg = document.getElementById("msg");
    const emailInput = document.getElementById("email");
    const senhaInput = document.getElementById("senha");
    const btnLogin = document.getElementById("btnLogin");
    const btnCadastro = document.getElementById("btnCadastro");
    const btnReset = document.getElementById("btnReset");

    function mostrarErro(texto) {
      msg.style.color = "#ff7b72";
      msg.textContent = texto;
    }

    function mostrarSucesso(texto) {
      msg.style.color = "#3fb950";
      msg.textContent = texto;
    }

    function limparMensagem() {
      msg.style.color = "#ff7b72";
      msg.textContent = "";
    }

    async function verificarSessao() {
      const { data } = await supabase.auth.getUser();
      if (data?.user) {
        await redirecionarPorPerfil();
      }
    }

    async function redirecionarPorPerfil() {
      try {
        const { data: authData } = await supabase.auth.getUser();
        if (!authData || !authData.user) { window.location.href = '/'; return; }

        // maybeSingle() não lança erro se não encontrar — retorna null
        const { data: colab, error: eColab } = await supabase
          .from('colaboradores')
          .select('id')
          .eq('auth_id', authData.user.id)
          .eq('ativo', true)
          .maybeSingle();

        if (eColab) {
          console.warn('[login] erro ao buscar colaborador:', eColab.message);
          window.location.href = '/';
          return;
        }

        if (colab) {
          // É colaborador/prestador → portal simplificado
          window.location.href = '/pages/colaborador.html';
        } else {
          // É gestor/dono → plataforma completa
          window.location.href = '/';
        }
      } catch(e) {
        console.error('[login] erro:', e);
        window.location.href = '/';
      }
    }

    async function login() {
      limparMensagem();

      const email = emailInput.value.trim();
      const senha = senhaInput.value.trim();

      if (!email || !senha) {
        mostrarErro("Preencha email e senha.");
        return;
      }

      const { error } = await supabase.auth.signInWithPassword({
        email,
        password: senha
      });

      if (error) {
        mostrarErro(error.message);
        return;
      }

      // Verificar perfil para redirecionar corretamente
      await redirecionarPorPerfil();
    }

    async function cadastrar() {
      limparMensagem();

      const email = emailInput.value.trim();
      const senha = senhaInput.value.trim();

      if (!email || !senha) {
        mostrarErro("Preencha email e senha.");
        return;
      }

      const { error } = await supabase.auth.signUp({
        email,
        password: senha
      });

      if (error) {
        mostrarErro(error.message);
        return;
      }

      mostrarSucesso("Conta criada. Verifique seu email.");
    }

    async function redefinirSenha() {
      limparMensagem();

      const email = emailInput.value.trim();

      if (!email) {
        mostrarErro("Digite seu email primeiro.");
        return;
      }

      const { error } = await supabase.auth.resetPasswordForEmail(email, {
        redirectTo: "https://sistemas-propostas.vercel.app/login.html"
      });

      if (error) {
        mostrarErro(error.message);
        return;
      }

      mostrarSucesso("Link de redefinição enviado!");
    }

    btnLogin.addEventListener("click", login);
    btnCadastro.addEventListener("click", cadastrar);
    btnReset.addEventListener("click", redefinirSenha);

    senhaInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        login();
      }
    });

    emailInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        login();
      }
    });

    verificarSessao();
  </script>
</body>
</html>
