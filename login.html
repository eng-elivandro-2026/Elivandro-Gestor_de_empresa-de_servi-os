<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>

  <style>
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#0d1117;
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
    }
    .box{
      width:320px;
      background:#161b22;
      border:1px solid #30363d;
      border-radius:10px;
      padding:24px;
    }
    h1{
      font-size:22px;
      margin:0 0 16px;
    }
    input{
      width:100%;
      box-sizing:border-box;
      padding:12px;
      margin:0 0 10px;
      border:none;
      border-radius:8px;
      background:#21262d;
      color:#fff;
    }
    button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:8px;
      background:#58a6ff;
      color:#000;
      font-weight:700;
      cursor:pointer;
      margin-top:6px;
    }
    #msg{
      margin-top:12px;
      font-size:14px;
      color:#ff7b72;
      min-height:18px;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>Entrar</h1>

    <input type="email" id="email" placeholder="Seu email" />
    <input type="password" id="senha" placeholder="Sua senha" />

    <button id="btnLogin">Entrar</button>
    <button id="btnCadastro">Criar conta</button>
    <button id="btnReset">Esqueci minha senha</button>

    <div id="msg"></div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js";

    const supabase = createClient(
      "https://ojuuzojwnyxdsavdosif.supabase.co",
      "sb_publishable_uqS8EZTOs5-sHKr1IpFhzg_eZrZOr7u"
    );

    const msg = document.getElementById("msg");

    async function verificarSessao() {
      const { data } = await supabase.auth.getUser();
      if (data?.user) {
        window.location.href = "/";
      }
    }

    async function login() {
      msg.textContent = "";

      const email = document.getElementById("email").value.trim();
      const senha = document.getElementById("senha").value.trim();

      const { error } = await supabase.auth.signInWithPassword({
        email,
        password: senha
      });

      if (error) {
        msg.textContent = error.message;
        return;
      }

      window.location.href = "/";
    }

    async function cadastrar() {
      msg.textContent = "";

      const email = document.getElementById("email").value.trim();
      const senha = document.getElementById("senha").value.trim();

      const { error } = await supabase.auth.signUp({
        email,
        password: senha
      });

      if (error) {
        msg.textContent = error.message;
        return;
      }

      msg.style.color = "#3fb950";
      msg.textContent = "Conta criada. Agora clique em Entrar.";
    }

    async function redefinirSenha() {
      msg.style.color = "#ff7b72";
      msg.textContent = "";

      const email = document.getElementById("email").value.trim();

      if (!email) {
        msg.textContent = "Digite seu email primeiro.";
        return;
      }

      const { error } = await supabase.auth.resetPasswordForEmail(email, {
        redirectTo: "https://sistemas-propostas.vercel.app/login.html"
      });

      if (error) {
        msg.textContent = error.message;
        return;
      }

      msg.style.color = "#3fb950";
      msg.textContent = "Enviei o link de redefinição para seu email.";
    }

    document.getElementById("btnLogin").addEventListener("click", login);
    document.getElementById("btnCadastro").addEventListener("click", cadastrar);
    document.getElementById("btnReset").addEventListener("click", redefinirSenha);

    verificarSessao();
  </script>
</body>
</html>
