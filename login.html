<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Sistema de Propostas</title>

  <style>
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#0d1117;
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
    }

    .container{
      display:flex;
      width:900px;
      max-width:95%;
      background:#161b22;
      border:1px solid #30363d;
      border-radius:12px;
      overflow:hidden;
    }

    .left{
      flex:1;
      background:#0d1117;
      padding:30px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      border-right:1px solid #30363d;
    }

    .logo{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:20px;
    }

    .logo-mk{
      background:#facc15;
      color:#000;
      font-weight:bold;
      padding:10px;
      border-radius:6px;
    }

    .logo-text{
      font-size:18px;
      font-weight:bold;
    }

    .logo-sub{
      font-size:12px;
      color:#8b949e;
    }

    .left h2{
      margin:20px 0 10px;
    }

    .left p{
      font-size:14px;
      color:#8b949e;
    }

    .right{
      flex:1;
      padding:30px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    h1{
      margin-bottom:20px;
    }

    input{
      width:100%;
      padding:12px;
      margin-bottom:10px;
      border:none;
      border-radius:8px;
      background:#21262d;
      color:#fff;
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:8px;
      background:#58a6ff;
      color:#000;
      font-weight:bold;
      cursor:pointer;
      margin-top:5px;
    }

    .btn-secondary{
      background:#30363d;
      color:#fff;
    }

    #msg{
      margin-top:10px;
      font-size:14px;
      color:#ff7b72;
      min-height:18px;
    }

    @media(max-width:768px){
      .container{
        flex-direction:column;
      }

      .left{
        border-right:none;
        border-bottom:1px solid #30363d;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- LADO ESQUERDO -->
    <div class="left">
      <div class="logo">
        <div class="logo-mk">EE</div>
        <div>
          <div class="logo-text">Eng. Elivandro</div>
          <div class="logo-sub">Sistema de Propostas</div>
        </div>
      </div>

      <h2>Bem-vindo</h2>
      <p>Gerencie propostas, análises e pipeline da sua empresa em um único sistema.</p>
    </div>

    <!-- LADO DIREITO -->
    <div class="right">
      <h1>Entrar</h1>

      <input type="email" id="email" placeholder="Seu email" />
      <input type="password" id="senha" placeholder="Sua senha" />

      <button id="btnLogin">Entrar</button>
      <button id="btnCadastro" class="btn-secondary">Criar conta</button>
      <button id="btnReset" class="btn-secondary">Esqueci minha senha</button>

      <div id="msg"></div>
    </div>

  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js";

    const supabase = createClient(
      "https://ojuuzojwnyxdsavdosif.supabase.co",
      "sb_publishable_uqS8EZTOs5-sHKr1IpFhzg_eZrZOr7u"
    );

    const msg = document.getElementById("msg");

    async function verificarSessao() {
      const { data } = await supabase.auth.getUser();
      if (data?.user) {
        window.location.href = "/";
      }
    }

    async function login() {
      msg.textContent = "";

      const email = document.getElementById("email").value.trim();
      const senha = document.getElementById("senha").value.trim();

      const { error } = await supabase.auth.signInWithPassword({
        email,
        password: senha
      });

      if (error) {
        msg.textContent = error.message;
        return;
      }

      window.location.href = "/";
    }

    async function cadastrar() {
      msg.textContent = "";

      const email = document.getElementById("email").value.trim();
      const senha = document.getElementById("senha").value.trim();

      const { error } = await supabase.auth.signUp({
        email,
        password: senha
      });

      if (error) {
        msg.textContent = error.message;
        return;
      }

      msg.style.color = "#3fb950";
      msg.textContent = "Conta criada. Verifique seu email.";
    }

    async function redefinirSenha() {
      msg.textContent = "";

      const email = document.getElementById("email").value.trim();

      if (!email) {
        msg.textContent = "Digite seu email primeiro.";
        return;
      }

      const { error } = await supabase.auth.resetPasswordForEmail(email, {
        redirectTo: "https://sistemas-propostas.vercel.app/login.html"
      });

      if (error) {
        msg.textContent = error.message;
        return;
      }

      msg.style.color = "#3fb950";
      msg.textContent = "Link de redefinição enviado!";
    }

    document.getElementById("btnLogin").addEventListener("click", login);
    document.getElementById("btnCadastro").addEventListener("click", cadastrar);
    document.getElementById("btnReset").addEventListener("click", redefinirSenha);

    verificarSessao();
  </script>

</body>
</html>
