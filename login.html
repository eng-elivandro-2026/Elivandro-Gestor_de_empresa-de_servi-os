<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Sistema de Propostas</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,sans-serif;background:#0d1117;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px}
    .container{display:flex;width:900px;max-width:100%;background:#161b22;border:1px solid #30363d;border-radius:12px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.35)}
    .left{flex:1;background:#0d1117;padding:30px;display:flex;flex-direction:column;justify-content:center;border-right:1px solid #30363d}
    .logo{display:flex;align-items:center;gap:10px;margin-bottom:20px}
    .logo-mk{background:#facc15;color:#000;font-weight:bold;padding:10px 12px;border-radius:6px}
    .logo-text{font-size:18px;font-weight:bold}
    .logo-sub{font-size:12px;color:#8b949e}
    .left h2{margin:20px 0 10px}
    .left p{font-size:14px;color:#8b949e;line-height:1.6}
    .right{flex:1;padding:30px;display:flex;flex-direction:column;justify-content:center}
    h1{margin:0 0 20px}
    input{width:100%;padding:12px;margin-bottom:10px;border:none;border-radius:8px;background:#21262d;color:#fff;font-size:16px;outline:none}
    input:focus{outline:2px solid #58a6ff;outline-offset:1px}
    .btn{width:100%;padding:12px;border:none;border-radius:8px;font-weight:bold;cursor:pointer;margin-top:5px;transition:opacity .2s;font-size:15px;font-family:inherit}
    .btn-blue{background:#58a6ff;color:#000}
    .btn-secondary{background:#30363d;color:#fff}
    .btn-empresa{background:#f0a500;color:#000;display:flex;align-items:center;justify-content:center;gap:10px;padding:14px}
    .btn-prestador{background:#3fb950;color:#000;display:flex;align-items:center;justify-content:center;gap:10px;padding:14px;margin-top:10px}
    .btn-empresa:hover,.btn-prestador:hover{opacity:.9}
    .role-picker{display:none;margin-top:8px}
    .role-picker .desc{font-size:12px;color:#8b949e;text-align:center;margin:8px 0 16px}
    .divider{display:flex;align-items:center;gap:10px;margin:16px 0}
    .divider hr{flex:1;border:none;border-top:1px solid #30363d}
    .divider span{font-size:12px;color:#8b949e;white-space:nowrap}
    .back-btn{background:none;border:none;color:#8b949e;cursor:pointer;font-size:13px;font-family:inherit;text-decoration:underline;width:auto;padding:0;margin-top:12px;text-align:center}
    #msg{margin-top:12px;font-size:14px;color:#ff7b72;min-height:20px;line-height:1.4}
    @media(max-width:768px){.container{flex-direction:column}.left{border-right:none;border-bottom:1px solid #30363d}.left,.right{padding:22px}}
  </style>
</head>
<body>
<div class="container">
  <div class="left">
    <div class="logo">
      <div class="logo-mk">EE</div>
      <div>
        <div class="logo-text">Eng. Elivandro</div>
        <div class="logo-sub">Sistema de Propostas</div>
      </div>
    </div>
    <h2>Bem-vindo</h2>
    <p>Gerencie propostas, análises e pipeline da sua empresa em um único sistema.</p>
    <p style="margin-top:16px;font-size:13px;color:#6e7681">Acesso disponível para gestores, donos e prestadores de serviço.</p>
  </div>

  <div class="right">
    <!-- Formulário de login -->
    <div id="formLogin">
      <h1>Entrar</h1>
      <input type="email" id="email" placeholder="Seu email" autocomplete="email" />
      <input type="password" id="senha" placeholder="Sua senha" autocomplete="current-password" />
      <button class="btn btn-blue" id="btnLogin">Entrar</button>
      <button class="btn btn-secondary" id="btnReset" style="margin-top:8px">Esqueci minha senha</button>
      <div id="msg"></div>
    </div>

    <!-- Seletor de perfil (aparece após login quando usuário tem duplo papel) -->
    <div id="rolePicker" style="display:none">
      <h1 style="margin-bottom:6px">Como deseja entrar?</h1>
      <div style="font-size:13px;color:#8b949e;margin-bottom:20px">Você tem acesso a mais de um perfil. Escolha como quer entrar agora:</div>

      <button class="btn btn-empresa" id="btnEntrarEmpresa">
        <span style="font-size:1.3rem">🏢</span>
        <div style="text-align:left">
          <div style="font-weight:700">Entrar como Empresa</div>
          <div style="font-size:11px;font-weight:400;opacity:.8">Gestor / Dono — acesso completo ao sistema</div>
        </div>
      </button>

      <button class="btn btn-prestador" id="btnEntrarPrestador">
        <span style="font-size:1.3rem">👷</span>
        <div style="text-align:left">
          <div style="font-weight:700">Entrar como Prestador</div>
          <div style="font-size:11px;font-weight:400;opacity:.8">Colaborador — apontamentos, boletins e histórico</div>
        </div>
      </button>

      <button class="back-btn" id="btnVoltar">← Usar outra conta</button>
    </div>
  </div>
</div>

<script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js";
  const supabase = createClient(
    "https://ojuuzojwnyxdsavdosif.supabase.co",
    "sb_publishable_uqS8EZTOs5-sHKr1IpFhzg_eZrZOr7u"
  );

  const msg        = document.getElementById("msg");
  const formLogin  = document.getElementById("formLogin");
  const rolePicker = document.getElementById("rolePicker");

  function mostrarErro(t){ msg.style.color="#ff7b72"; msg.textContent=t; }
  function mostrarSucesso(t){ msg.style.color="#3fb950"; msg.textContent=t; }

  // Verificar se tem sessão ativa ao carregar (inclui magic link no hash)
  async function verificarSessao() {
    // Se há token de magic link no hash, aguardar Supabase processar antes de checar
    if (window.location.hash && window.location.hash.includes('access_token')) {
      await new Promise((resolve) => {
        const timeout = setTimeout(resolve, 5000);
        const { data: { subscription } } = supabase.auth.onAuthStateChange((event, session) => {
          if (session || event === 'SIGNED_IN') {
            clearTimeout(timeout);
            subscription.unsubscribe();
            resolve();
          }
        });
      });
    }
    const { data } = await supabase.auth.getUser();
    if (data?.user) await decidirDestino(data.user);
  }

  // Decidir para onde ir após login
  async function decidirDestino(user) {
    const { data: usuario } = await supabase
      .from('usuarios').select('perfil').eq('auth_id', user.id).eq('ativo', true).maybeSingle();

    const ehGestorOuDono = usuario && (usuario.perfil === 'dono' || usuario.perfil === 'gestor' || usuario.perfil === 'admin');

    const { data: colab } = await supabase
      .from('colaboradores').select('id').eq('auth_id', user.id).eq('ativo', true).maybeSingle();

    // Verificar também pelo email (fallback)
    let ehColaborador = !!colab;
    if (!ehColaborador) {
      const { data: colabEmail } = await supabase
        .from('colaboradores').select('id').eq('email', user.email).eq('ativo', true).maybeSingle();
      ehColaborador = !!colabEmail;
      // Vincular auth_id automaticamente
      if (colabEmail) {
        supabase.from('colaboradores').update({ auth_id: user.id }).eq('id', colabEmail.id).then(()=>{});
      }
    }

    if (ehGestorOuDono && ehColaborador) {
      // Duplo papel — mostrar seletor
      formLogin.style.display = 'none';
      rolePicker.style.display = 'block';
      return;
    }

    if (ehGestorOuDono) {
      window.location.href = '/'; return;
    }

    if (ehColaborador) {
      window.location.href = '/pages/colaborador.html'; return;
    }

    // Sem perfil — acesso ao sistema principal
    window.location.href = '/';
  }

  // Login
  document.getElementById("btnLogin").addEventListener("click", async () => {
    msg.textContent = '';
    const email = document.getElementById("email").value.trim();
    const senha = document.getElementById("senha").value.trim();
    if (!email || !senha) { mostrarErro("Preencha email e senha."); return; }

    const { error } = await supabase.auth.signInWithPassword({ email, password: senha });
    if (error) { mostrarErro(error.message); return; }

    const { data } = await supabase.auth.getUser();
    if (data?.user) await decidirDestino(data.user);
  });

  // Entrar como empresa
  document.getElementById("btnEntrarEmpresa").addEventListener("click", () => {
    window.location.href = '/';
  });

  // Entrar como prestador
  document.getElementById("btnEntrarPrestador").addEventListener("click", () => {
    window.location.href = '/pages/colaborador.html';
  });

  // Voltar
  document.getElementById("btnVoltar").addEventListener("click", async () => {
    await supabase.auth.signOut();
    formLogin.style.display = 'block';
    rolePicker.style.display = 'none';
    document.getElementById("email").value = '';
    document.getElementById("senha").value = '';
  });

  // Esqueci a senha
  document.getElementById("btnReset").addEventListener("click", async () => {
    msg.textContent = '';
    const email = document.getElementById("email").value.trim();
    if (!email) { mostrarErro("Digite seu email primeiro."); return; }
    const { error } = await supabase.auth.resetPasswordForEmail(email, {
      redirectTo: "https://sistemas-propostas.vercel.app/login.html"
    });
    if (error) { mostrarErro(error.message); return; }
    mostrarSucesso("Link de redefinição enviado!");
  });

  // Enter para login
  ["email","senha"].forEach(id => {
    document.getElementById(id).addEventListener("keydown", e => {
      if (e.key === "Enter") document.getElementById("btnLogin").click();
    });
  });

  verificarSessao();
</script>
</body>
</html>
