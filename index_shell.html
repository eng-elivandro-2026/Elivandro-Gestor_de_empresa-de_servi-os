<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TecFusion — Plataforma</title>

<!-- ── CSS da plataforma ── -->
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">

<style>
/* ── Variáveis (fallback caso variables.css não exista ainda) ── */
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;
  --border:#30363d;--border2:#484f58;
  --text:#e6edf3;--text2:#8b949e;--text3:#6e7681;
  --accent:#f0a500;--green:#3fb950;--blue:#58a6ff;
  --red:#f85149;--purple:#bc8cff;
  --r:8px;--r2:6px;
  --sidebar-w:220px;
  --sidebar-w-collapsed:52px;
  --hdr-h:52px;
}
body.light{
  --bg:#f5f7fb;--bg2:#ffffff;--bg3:#eef2f7;
  --border:#d5dce6;--border2:#bfc9d7;
  --text:#111827;--text2:#4b5563;--text3:#6b7280;
  --accent:#d97706;--green:#15803d;--blue:#2563eb;
  --red:#dc2626;--purple:#7c3aed;
}

*{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  background:var(--bg);color:var(--text);height:100vh;overflow:hidden;
}

/* ── LAYOUT PRINCIPAL ── */
.app-shell{
  display:grid;
  grid-template-rows:var(--hdr-h) 1fr;
  grid-template-columns:var(--sidebar-w) 1fr;
  grid-template-areas:
    "hdr hdr"
    "sidebar main";
  height:100vh;
}
.app-shell.collapsed{
  grid-template-columns:var(--sidebar-w-collapsed) 1fr;
}

/* ── HEADER ── */
.hdr{
  grid-area:hdr;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 1rem;
  background:rgba(13,17,23,.97);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  z-index:200;
  gap:.75rem;
}
body.light .hdr{background:rgba(255,255,255,.97)}

.hdr-left{display:flex;align-items:center;gap:.75rem}

.logo{display:flex;align-items:center;gap:.55rem;text-decoration:none}
.logo-mk{
  width:32px;height:32px;
  background:var(--accent);border-radius:7px;
  display:grid;place-items:center;
  font-size:.75rem;font-weight:900;color:#000;flex-shrink:0;
}
.logo-txt{font-size:.9rem;font-weight:700;line-height:1;color:var(--text)}
.logo-sub{font-size:.55rem;color:var(--text3);text-transform:uppercase;letter-spacing:.07em}

.sidebar-toggle{
  width:30px;height:30px;
  background:transparent;border:1px solid var(--border);
  border-radius:var(--r2);color:var(--text2);
  cursor:pointer;font-size:.75rem;
  display:grid;place-items:center;
  transition:all .15s;flex-shrink:0;
}
.sidebar-toggle:hover{background:var(--bg3);color:var(--text)}

.hdr-right{display:flex;align-items:center;gap:.5rem}

.hdr-user{
  display:flex;align-items:center;gap:.4rem;
  font-size:.75rem;color:var(--text2);
}
.hdr-avatar{
  width:28px;height:28px;border-radius:50%;
  background:rgba(240,165,0,.15);border:1px solid rgba(240,165,0,.3);
  display:grid;place-items:center;
  font-size:.65rem;font-weight:700;color:var(--accent);
}

.btn-hdr{
  padding:.3rem .6rem;border:1px solid var(--border);
  background:transparent;color:var(--text2);
  border-radius:var(--r2);cursor:pointer;font-size:.7rem;
  font-family:inherit;transition:all .15s;
}
.btn-hdr:hover{background:var(--bg3);color:var(--text)}
.btn-hdr.danger:hover{border-color:var(--red);color:var(--red)}

/* ── SIDEBAR ── */
.sidebar{
  grid-area:sidebar;
  background:var(--bg2);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;
  transition:width .2s ease;
}

.sidebar-section{
  padding:.6rem .5rem .3rem;
  font-size:.6rem;font-weight:700;
  color:var(--text3);text-transform:uppercase;letter-spacing:.08em;
}
.app-shell.collapsed .sidebar-section{display:none}

/* Módulos */
#sidebar-modulos{
  padding:.4rem .5rem;
  border-bottom:1px solid var(--border);
}

.mod-btn{
  width:100%;display:flex;align-items:center;gap:.5rem;
  padding:.42rem .6rem;border:none;
  background:transparent;color:var(--text2);
  border-radius:var(--r2);cursor:pointer;
  font-size:.78rem;font-weight:500;
  transition:all .15s;text-align:left;font-family:inherit;
  white-space:nowrap;overflow:hidden;
}
.mod-btn:hover{background:var(--bg3);color:var(--text)}
.mod-btn.on{
  background:rgba(240,165,0,.12);color:var(--accent);
  font-weight:700;border-left:3px solid var(--accent);
  padding-left:calc(.6rem - 3px);
}
.mod-icon{font-size:.95rem;flex-shrink:0;width:20px;text-align:center}
.mod-label{flex:1;overflow:hidden;text-overflow:ellipsis}
.app-shell.collapsed .mod-label{display:none}

.mod-badge{
  font-size:.55rem;font-weight:700;
  background:rgba(88,166,255,.12);color:var(--blue);
  padding:.1rem .3rem;border-radius:20px;
  border:1px solid rgba(88,166,255,.2);
  white-space:nowrap;
}
.app-shell.collapsed .mod-badge{display:none}

/* Navegação do módulo ativo */
#sidebar-nav-mod{
  flex:1;overflow-y:auto;
  padding:.4rem .5rem;
}
#sidebar-nav-mod::-webkit-scrollbar{width:3px}
#sidebar-nav-mod::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.nav-item{
  width:100%;display:flex;align-items:center;gap:.45rem;
  padding:.38rem .6rem;border:none;
  background:transparent;color:var(--text2);
  border-radius:var(--r2);cursor:pointer;
  font-size:.76rem;transition:all .15s;
  text-align:left;font-family:inherit;white-space:nowrap;
  overflow:hidden;
}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.on{background:var(--bg3);color:var(--text);font-weight:600}
.app-shell.collapsed .nav-item span:last-child{display:none}

.nav-vazio{
  font-size:.72rem;color:var(--text3);
  padding:.5rem .6rem;font-style:italic;
}

/* Footer sidebar */
.sidebar-footer{
  padding:.6rem .5rem;
  border-top:1px solid var(--border);
  display:flex;flex-direction:column;gap:.3rem;
}

/* ── ÁREA PRINCIPAL ── */
.main-area{
  grid-area:main;
  position:relative;
  overflow:hidden;
  background:var(--bg);
}

/* Área inline (módulo Comercial) */
#area-inline{
  position:absolute;inset:0;
  overflow-y:auto;
}
#area-inline::-webkit-scrollbar{width:5px}
#area-inline::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* Área de iframes */
#area-frames{
  position:absolute;inset:0;
  pointer-events:none;
}

.mod-frame{
  position:absolute;inset:0;
  width:100%;height:100%;
  border:none;
  display:none;
  pointer-events:none;
}
.mod-frame.visible{
  display:block;
  pointer-events:all;
}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--bg3);color:var(--text);
  border:1px solid var(--border);
  padding:.5rem 1.1rem;border-radius:20px;
  font-size:.78rem;font-weight:500;
  opacity:0;transition:all .25s;z-index:9999;
  pointer-events:none;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{border-color:var(--green);color:var(--green)}
#toast.err{border-color:var(--red);color:var(--red)}

/* ── LOADING OVERLAY ── */
#loading{
  position:fixed;inset:0;z-index:9000;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:1rem;
  transition:opacity .3s;
}
#loading.hide{opacity:0;pointer-events:none}
.loading-logo{
  width:48px;height:48px;background:var(--accent);
  border-radius:12px;display:grid;place-items:center;
  font-size:1.1rem;font-weight:900;color:#000;
}
.loading-txt{font-size:.8rem;color:var(--text3)}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .app-shell{
    grid-template-columns:0 1fr;
    grid-template-areas:"hdr hdr" "sidebar main";
  }
  .app-shell.sidebar-open{
    grid-template-columns:var(--sidebar-w) 1fr;
  }
  .sidebar{position:fixed;top:var(--hdr-h);left:0;bottom:0;z-index:150;transform:translateX(-100%);transition:transform .2s}
  .app-shell.sidebar-open .sidebar{transform:translateX(0)}
  .overlay{display:none;position:fixed;inset:0;top:var(--hdr-h);background:rgba(0,0,0,.5);z-index:140}
  .app-shell.sidebar-open .overlay{display:block}
}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>

<body onload="iniciarPlataforma()">

<!-- Loading overlay -->
<div id="loading">
  <div class="loading-logo">FX</div>
  <div class="loading-txt">Carregando plataforma...</div>
</div>

<!-- Overlay mobile -->
<div class="overlay" onclick="toggleSidebar()"></div>

<div class="app-shell" id="shell">

  <!-- ── HEADER ── -->
  <header class="hdr">
    <div class="hdr-left">
      <button class="sidebar-toggle" onclick="toggleSidebar()" title="Recolher sidebar">☰</button>
      <a class="logo" href="#">
        <div class="logo-mk">FX</div>
        <div>
          <div class="logo-txt">TecFusion</div>
          <div class="logo-sub">Plataforma Empresarial</div>
        </div>
      </a>
    </div>

    <div class="hdr-right">
      <span id="hdr-data" style="font-size:.7rem;color:var(--text3)"></span>
      <button class="btn-hdr" onclick="toggleTheme()" title="Alternar tema">🌙</button>
      <div class="hdr-user">
        <div class="hdr-avatar" id="hdr-avatar">EE</div>
        <span id="hdr-email" style="font-size:.72rem;color:var(--text2)"></span>
      </div>
      <button class="btn-hdr danger" onclick="sair()" title="Sair">Sair</button>
    </div>
  </header>

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">

    <div class="sidebar-section">Módulos</div>

    <!-- Botões de módulos (gerados pelo router.js) -->
    <div id="sidebar-modulos"></div>

    <div class="sidebar-section" id="sidebar-nav-label">Seções</div>

    <!-- Subitens do módulo ativo (gerados pelo router.js) -->
    <nav id="sidebar-nav-mod"></nav>

    <!-- Footer -->
    <div class="sidebar-footer">
      <button class="btn-hdr" onclick="sbMigrarLocal && sbMigrarLocal()" style="font-size:.68rem;color:var(--text3)">
        ☁️ Sincronizar nuvem
      </button>
    </div>

  </aside>

  <!-- ── ÁREA PRINCIPAL ── -->
  <main class="main-area">

    <!-- Conteúdo inline (módulo Comercial e futuros módulos inline) -->
    <div id="area-inline">
      <!-- O conteúdo do módulo comercial é injetado aqui -->
      <!-- Manter o wrap e seções do index.html original aqui -->
    </div>

    <!-- Iframes dos módulos externos -->
    <div id="area-frames"></div>

  </main>

</div><!-- /app-shell -->

<div id="toast"></div>

<!-- ── SCRIPTS ── -->

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config/supabase.js"></script>
<script src="js/config/supabase-sync.js"></script>
<script src="js/config/schema-proposta.js"></script>

<!-- Core -->
<script src="js/core/app-core.js"></script>
<script src="js/core/router.js"></script>

<!-- Módulos -->
<script src="js/modules/categoria-analise.js"></script>
<script src="js/modules/cotacao.js"></script>
<script src="js/modules/gantt.js"></script>
<script src="js/modules/log-modal.js"></script>
<script src="js/modules/ui-panels.js"></script>

<script>
// ── Inicialização da plataforma ─────────────────────────

async function iniciarPlataforma() {
  // 1. Verifica autenticação
  if (typeof protegerPagina === 'function') {
    await protegerPagina();
  }

  // 2. Carrega usuário e exibe no header
  try {
    var { data } = await window.sbClient.auth.getUser();
    if (data && data.user) {
      var email = data.user.email || '';
      document.getElementById('hdr-email').textContent = email.split('@')[0];
      document.getElementById('hdr-avatar').textContent = email.slice(0,2).toUpperCase();
    }
  } catch(e) {}

  // 3. Aplica tema salvo
  var tema = localStorage.getItem('tf_theme') || 'dark';
  document.body.classList.toggle('light', tema === 'light');

  // 4. Atualiza data no header
  atualizarDataHeader();
  setInterval(atualizarDataHeader, 60000);

  // 5. Inicializa roteador — restaura última rota ou vai para comercial
  var ultimaRota = localStorage.getItem('tf_route') || 'comercial';
  Router.init(ultimaRota);

  // 6. Esconde loading
  setTimeout(function () {
    var l = document.getElementById('loading');
    if (l) l.classList.add('hide');
    setTimeout(function () { if (l) l.remove(); }, 400);
  }, 600);
}

function atualizarDataHeader() {
  var el = document.getElementById('hdr-data');
  if (!el) return;
  var d = new Date();
  el.textContent = d.toLocaleDateString('pt-BR', { weekday:'short', day:'2-digit', month:'short' });
}

function toggleTheme() {
  var atual = localStorage.getItem('tf_theme') || 'dark';
  var novo = atual === 'light' ? 'dark' : 'light';
  localStorage.setItem('tf_theme', novo);
  document.body.classList.toggle('light', novo === 'light');
  document.querySelector('.btn-hdr[onclick*="toggleTheme"]').textContent = novo === 'light' ? '🌙' : '☀️';
  // Propaga para iframes
  document.querySelectorAll('.mod-frame').forEach(function (f) {
    try { f.contentWindow.postMessage({ type: 'SET_TEMA', tema: novo }, '*'); } catch(e) {}
  });
}

function toggleSidebar() {
  var shell = document.getElementById('shell');
  shell.classList.toggle('collapsed');
  shell.classList.toggle('sidebar-open');
}

async function sair() {
  if (typeof logout === 'function') await logout();
  else window.location.href = '/login.html';
}

// Toast global
var _toastT = null;
function toast(msg, tipo) {
  var t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  t.className = 'show ' + (tipo || 'ok');
  clearTimeout(_toastT);
  _toastT = setTimeout(function () { t.className = ''; }, 2400);
}
</script>

</body>
</html>
