<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reunião de Radar</title>
<style>
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;
  --border:#30363d;--border2:#484f58;
  --text:#e6edf3;--text2:#8b949e;--text3:#6e7681;
  --accent:#f0a500;--green:#3fb950;--blue:#58a6ff;--red:#f85149;
  --r:8px;--r2:6px;
  --emp-cor:#f0a500;--emp-bg:rgba(240,165,0,.10);--emp-bdr:rgba(240,165,0,.28);
}
body.light{
  --bg:#f5f7fb;--bg2:#ffffff;--bg3:#eef2f7;--border:#d5dce6;--border2:#bfc9d7;
  --text:#111827;--text2:#4b5563;--text3:#6b7280;--accent:#d97706;--green:#15803d;--blue:#2563eb;--red:#dc2626;
}
body.empresa-tema-tecfusion{ --emp-cor:#4DB748;--emp-bg:rgba(77,183,72,.10);--emp-bdr:rgba(77,183,72,.32); }
body.empresa-tema-fortex{ --emp-cor:#F5A623;--emp-bg:rgba(245,166,35,.10);--emp-bdr:rgba(245,166,35,.32); }
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.wrap{max-width:1180px;margin:0 auto;padding:1.1rem}
.hdr{display:flex;align-items:center;gap:.7rem;margin-bottom:1rem;padding-bottom:.8rem;border-bottom:1px solid var(--border)}
.hdr-mk{width:40px;height:40px;border-radius:10px;background:var(--emp-cor);display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:1rem;flex-shrink:0}
.hdr-nome{font-size:1.15rem;font-weight:800;line-height:1.1}
.hdr-sub{font-size:.72rem;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.abas{display:flex;gap:.3rem;border-bottom:1px solid var(--border);margin-bottom:1rem;flex-wrap:wrap}
.aba{padding:.5rem .9rem;border:none;background:transparent;color:var(--text3);font-size:.82rem;font-weight:700;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent}
.aba.on{color:var(--emp-cor);border-bottom-color:var(--emp-cor)}
.btn{border:none;border-radius:var(--r2);padding:.45rem .85rem;font-size:.8rem;font-weight:700;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:.35rem}
.btn-emp{background:var(--emp-cor);color:#fff}.btn-emp:hover{filter:brightness(1.08)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}.btn-ghost:hover{color:var(--text);border-color:var(--text2)}
.btn-sm{padding:.3rem .6rem;font-size:.74rem}
.sec{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.1rem;margin-bottom:1rem}
.sec-t{font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--emp-cor);margin-bottom:.6rem}
.fgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:.6rem}
.fld label{font-size:.66rem;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:.22rem}
.fld input,.fld select,.fld textarea{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:var(--r2);color:var(--text);font-family:inherit;font-size:.85rem;padding:.45rem .6rem;line-height:1.5}
.fld textarea{resize:vertical;min-height:70px}
.full{grid-column:1/-1}
/* Cronômetro */
.cron{position:sticky;top:0;z-index:50;background:var(--bg2);border:1px solid var(--emp-bdr);border-radius:var(--r);padding:.7rem 1rem;margin-bottom:1rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.cron-disp{font-size:2.2rem;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:1px;min-width:130px;text-align:center}
.cron-ctrl{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
.cron-ctrl input,.cron-ctrl select{background:var(--bg);border:1px solid var(--border2);border-radius:var(--r2);color:var(--text);font-family:inherit;font-size:.8rem;padding:.35rem .5rem}
.cron-ctrl input{width:64px}
.ata-codigo{font-weight:800;font-size:1rem;color:var(--emp-cor);margin-bottom:.6rem}
.ata-cod-hint{font-weight:600;font-size:.7rem;color:var(--text3)}
.ata-trava{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;background:rgba(248,81,73,.12);border:1px solid rgba(248,81,73,.4);color:var(--red);border-radius:var(--r);padding:.6rem .8rem;margin-bottom:1rem;font-size:.82rem;font-weight:700}
.conc-card{background:var(--bg2);border:1px solid var(--emp-bdr);border-radius:var(--r);padding:2rem 1.2rem;text-align:center;display:flex;flex-direction:column;align-items:center;gap:.7rem}
.conc-ok{font-size:1.25rem;font-weight:800;color:var(--emp-cor)}
.conc-txt{font-size:.9rem;color:var(--text2);max-width:440px;line-height:1.5}
.conc-card .btn{font-size:.9rem;padding:.6rem 1.1rem;margin-top:.3rem}
.conc-sub{font-size:.74rem;color:var(--text3)}
/* Indicadores */
.tbl{width:100%;border-collapse:collapse;font-size:.82rem}
.tbl th{text-align:left;padding:.5rem .55rem;background:var(--emp-cor);color:#fff;font-size:.66rem;text-transform:uppercase;letter-spacing:.03em;border:1px solid rgba(255,255,255,.2)}
.tbl td{padding:.45rem .55rem;border:1px solid var(--border);vertical-align:top}
.tbl td.ind-nome{font-weight:700}
.tbl textarea{width:100%;min-width:160px;background:var(--bg);border:1px solid var(--border2);border-radius:var(--r2);color:var(--text);font-family:inherit;font-size:.78rem;padding:.35rem .45rem;resize:vertical;min-height:60px;line-height:1.4}
.badge{display:inline-block;font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.03em;padding:.12rem .45rem;border-radius:20px}
.bg-ok{background:rgba(63,185,80,.16);color:var(--green)}
.bg-fora{background:rgba(248,81,73,.16);color:var(--red)}
/* Assuntos da reunião anterior */
.ass-placar{display:flex;gap:1rem;flex-wrap:wrap;font-size:.78rem;font-weight:700;margin-bottom:.7rem;color:var(--text2)}
.ass-placar .ass-p-ok{color:var(--green)}
.ass-placar .ass-p-no{color:var(--red)}
.ass-placar .ass-p-pend{color:var(--text3)}
.ass-row{display:flex;align-items:center;gap:.6rem;background:var(--bg);border:1px solid var(--border);border-radius:var(--r2);padding:.5rem .6rem;margin-bottom:.5rem}
.ass-row .ass-txt{flex:1;font-size:.85rem;line-height:1.4;word-break:break-word}
.ass-st{flex-shrink:0;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);border-radius:20px;font-family:inherit;font-size:.72rem;font-weight:700;padding:.25rem .6rem;cursor:pointer;white-space:nowrap}
.ass-del{flex-shrink:0;border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:.9rem;padding:.1rem .3rem}
.ass-del:hover{color:var(--red)}
.ass-row.ass-ok{background:rgba(63,185,80,.12);border-color:rgba(63,185,80,.4)}
.ass-row.ass-ok .ass-txt{color:var(--green)}
.ass-row.ass-ok .ass-st{background:rgba(63,185,80,.18);border-color:var(--green);color:var(--green)}
.ass-row.ass-no{background:rgba(248,81,73,.12);border-color:rgba(248,81,73,.4)}
.ass-row.ass-no .ass-txt{color:var(--red)}
.ass-row.ass-no .ass-st{background:rgba(248,81,73,.18);border-color:var(--red);color:var(--red)}
.ass-add{display:flex;gap:.5rem;margin-top:.6rem}
.ass-add input{flex:1;background:var(--bg);border:1px solid var(--border2);border-radius:var(--r2);color:var(--text);font-family:inherit;font-size:.82rem;padding:.45rem .6rem}
.ass-vazio{color:var(--text3);font-style:italic;font-size:.82rem;padding:.3rem 0}
/* Como funciona */
.cf-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:.8rem}
.cf-card{background:var(--bg2);border:1px solid var(--border);border-left:4px solid var(--emp-cor);border-radius:var(--r);padding:.9rem 1rem}
.cf-card h3{font-size:.92rem;font-weight:800;margin-bottom:.4rem;display:flex;align-items:center;gap:.4rem}
.cf-card p,.cf-card li{font-size:.83rem;line-height:1.55;color:var(--text2)}
.cf-card ul{margin:.3rem 0 0 1.1rem}
/* Histórico */
.hist-item{background:var(--bg2);border:1px solid var(--border);border-left:4px solid var(--emp-cor);border-radius:var(--r);padding:.7rem .9rem;margin-bottom:.6rem;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:.6rem}
.hist-item:hover{border-color:var(--border2)}
.hist-d{font-weight:800;font-size:.95rem}
.hist-sub{font-size:.74rem;color:var(--text3)}
.hist-del{border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:1rem;padding:.2rem .4rem;border-radius:var(--r2)}
.hist-del:hover{color:var(--red)}
.acoes{display:flex;gap:.5rem;justify-content:flex-end;flex-wrap:wrap;margin-top:.4rem}
.vazio{color:var(--text3);font-style:italic;font-size:.86rem;padding:1rem 0}
.ro-txt{white-space:pre-wrap;font-size:.85rem;line-height:1.55}

/* Impressão (paisagem) */
#print-cab,#print-rod{display:none}
@media print{
  @page{ size:A4 landscape; margin:10mm }
  *{ -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important }
  html,body{ background:#fff !important; color:#111 !important; height:auto !important }
  .hdr,.abas,.btn,.cron,.no-print,#aba-como,#aba-hist .hist-item,#aba-hist .acoes{ display:none !important }
  .sec{ border:1px solid #ccc !important; background:#fff !important; page-break-inside:avoid }
  .sec-t{ color:#111 !important }
  .fld input,.fld select,.fld textarea,.tbl textarea{ background:#fff !important; color:#111 !important; border:1px solid #ccc !important }
  .tbl th{ background:#4DB748 !important; color:#fff !important; border:1px solid #cfcfcf !important }
  .tbl td{ border:1px solid #cfcfcf !important; color:#111 !important }
  .ass-del,.ass-add{ display:none !important }
  .ass-row{ background:#fff !important; border:1px solid #cfcfcf !important; page-break-inside:avoid }
  .ass-row .ass-txt{ color:#111 !important }
  .ass-st{ background:#fff !important }
  .ass-row.ass-ok .ass-txt,.ass-row.ass-ok .ass-st{ color:#15803d !important; border-color:#15803d !important }
  .ass-row.ass-no .ass-txt,.ass-row.ass-no .ass-st{ color:#b91c1c !important; border-color:#b91c1c !important }
  #print-cab{ display:block !important; border-bottom:3px solid #4DB748; padding-bottom:6px; margin-bottom:10px }
  #print-cab .pc-logo{ font-weight:900; font-size:16px; color:#4DB748; letter-spacing:1px }
  #print-cab .pc-tool{ font-size:12px; font-weight:700; color:#111; margin-top:2px }
  #print-rod{ display:block !important; margin-top:10px; text-align:center; font-size:9px; color:#666; border-top:1px solid #ddd; padding-top:4px }
}
</style>
</head>
<body>
<div class="wrap">
  <div id="print-cab"></div>
  <div class="hdr">
    <div class="hdr-mk" id="hdr-mk">—</div>
    <div><div class="hdr-nome" id="hdr-nome">—</div><div class="hdr-sub">Reunião de Radar</div></div>
  </div>

  <div class="abas">
    <button class="aba on" id="t-como" onclick="trocarAba('como')">Como funciona</button>
    <button class="aba" id="t-ata" onclick="trocarAba('ata')">Ata atual</button>
    <button class="aba" id="t-hist" onclick="trocarAba('hist')">Histórico</button>
  </div>

  <!-- ABA 1 -->
  <div id="aba-como"></div>

  <!-- ABA 2 -->
  <div id="aba-ata" style="display:none">
   <div id="ata-form">
    <div class="cron no-print">
      <div class="cron-disp" id="cr-display">15:00</div>
      <div class="cron-ctrl">
        <button class="btn btn-emp btn-sm" id="cr-play" onclick="crToggle()">▶ Iniciar</button>
        <button class="btn btn-ghost btn-sm" onclick="crZerar()">⟲ Zerar</button>
        <label style="font-size:.7rem;color:var(--text3)">Min <input type="number" id="cr-min" value="15" min="0" onchange="crRender()"></label>
        <select id="cr-modo" onchange="crZerar()">
          <option value="reg">Regressivo</option>
          <option value="prog">Progressivo</option>
        </select>
      </div>
      <button class="btn btn-emp btn-sm" id="btn-nova-ata" style="display:none;margin-left:auto" onclick="iniciarNovaAta()">＋ Nova ata</button>
    </div>

    <div id="ata-trava" class="ata-trava no-print" style="display:none"></div>

    <div class="sec">
      <div class="sec-t">Cabeçalho da ata</div>
      <div id="ata-codigo" class="ata-codigo"></div>
      <div class="fgrid">
        <div class="fld"><label>Data</label><input type="date" id="a-data" onchange="_renderCodigoAta()"></div>
        <div class="fld"><label>Anfitrião</label><input id="a-anfitriao"></div>
        <div class="fld"><label>Status</label><select id="a-status"><option value="aberta">Aberta</option><option value="concluida">Concluída</option></select></div>
        <div class="fld full"><label>Participantes</label><input id="a-participantes"></div>
      </div>
    </div>

    <div class="sec">
      <div class="sec-t">Indicadores da semana</div>
      <div id="ata-indicadores"></div>
    </div>

    <div class="sec">
      <div class="sec-t">Assuntos da reunião anterior</div>
      <div id="ata-assuntos-placar" class="ass-placar"></div>
      <div id="ata-assuntos"></div>
      <div class="ass-add no-print" id="ass-add-row">
        <input id="ass-novo" placeholder="Adicionar assunto…" onkeydown="if(event.key==='Enter'){event.preventDefault();addAssunto();}">
        <button class="btn btn-ghost btn-sm" onclick="addAssunto()">＋ Adicionar</button>
      </div>
    </div>

    <div class="sec">
      <div class="sec-t">Novidades da semana</div>
      <div class="fld"><textarea id="a-novidades"></textarea></div>
    </div>
    <div class="sec">
      <div class="sec-t">Onde estamos presos (restrições)</div>
      <div class="fld"><textarea id="a-restricoes"></textarea></div>
    </div>
    <div class="sec">
      <div class="sec-t">Conclusão — principais pontos e próximos passos</div>
      <div class="fld"><textarea id="a-conclusao"></textarea></div>
    </div>

    <div class="acoes no-print">
      <button class="btn btn-ghost" onclick="imprimirAta()">🖨️ Imprimir PDF</button>
      <button class="btn btn-emp" id="btn-salvar-ata" onclick="salvarAta()" style="display:none">Salvar ata</button>
    </div>
   </div><!-- /#ata-form -->
   <div id="ata-concluida-estado" style="display:none"></div>
  </div>

  <!-- ABA 3 -->
  <div id="aba-hist" style="display:none">
    <div class="sec no-print" id="hist-busca-wrap">
      <div class="fld"><label>Buscar (data, anfitrião ou texto)</label><input id="hist-busca" oninput="renderHistorico()" placeholder="Ex: 2026-06, João, conclusão…"></div>
    </div>
    <div id="hist-lista"></div>
    <div id="hist-detalhe"></div>
  </div>

  <div id="print-rod"></div>
</div>

<script>
// ============================================================
// Reunião de Radar — ata semanal por empresa + indicadores (snapshot).
// Página iframe: empresa via postMessage; dados via window.parent.sbClient.
// ============================================================
var _empresaAtiva=null;
var _metas=[];        // metas ativas (para montar a ata atual)
var _indForm=[];      // indicadores da ata em edição (snapshot em construção)
var _ataId=null;      // id da reunião em edição (null = nova)
var _numeroAta=null;  // numero_ata da ata em edição (null = nova, gerado ao salvar)
var _ataConcluida=false; // status persistido da ata no editor (true = travada)
var _reunioes=[];     // histórico
var _indByReuniao={}; // indicadores agrupados por reuniao_id
var _assForm=[];      // assuntos da reunião anterior em edição: {texto, status}
var _assByReuniao={}; // assuntos salvos agrupados por reuniao_id
var _aba='como';

function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function _sb(){ try{ return (window.parent&&window.parent.sbClient)?window.parent.sbClient:null; }catch(e){ return null; } }
function _podeEditar(){ try{ return !!(window.parent&&typeof window.parent.podeAcao==='function'&&window.parent.podeAcao('reuniao-radar','editar')); }catch(e){ return false; } }
function _ehDono(){ try{ var p=(window.parent&&(typeof window.parent.getPerfilUsuario==='function'?window.parent.getPerfilUsuario():window.parent._perfilUsuario))||''; return String(p).toLowerCase()==='dono'; }catch(e){ return false; } }
// Editor liberado só se pode editar E a ata não está concluída (travada).
function _editavelAta(){ return _podeEditar() && !_ataConcluida; }
// Aplica/retira a trava de edição no editor da aba "Ata atual".
function _aplicarTravaAta(){
  var travada=_ataConcluida, pode=_podeEditar();
  ['a-data','a-anfitriao','a-status','a-participantes','a-novidades','a-restricoes','a-conclusao'].forEach(function(id){
    var e=document.getElementById(id); if(e) e.disabled = travada || !pode;
  });
  var an=document.getElementById('ass-novo'); if(an) an.disabled = travada || !pode;
  var addRow=document.getElementById('ass-add-row'); if(addRow) addRow.style.display=(travada||!pode)?'none':'flex';
  var bs=document.getElementById('btn-salvar-ata'); if(bs) bs.style.display=(!travada&&pode)?'inline-flex':'none';
  var tv=document.getElementById('ata-trava');
  if(tv){
    if(travada){
      tv.style.display='';
      tv.innerHTML='<span>🔒 Ata concluída — travada para edição.</span>'+
        (_ehDono()?' <button class="btn btn-ghost btn-sm" onclick="reabrirAtaConcluida(\''+(_ataId||'')+'\')">🔓 Reabrir ata</button>':'');
    } else { tv.style.display='none'; tv.innerHTML=''; }
  }
}
// Alterna entre o formulário da ata e o estado de "aguardando nova reunião".
function _mostrarFormAta(){
  var est=document.getElementById('ata-concluida-estado'); if(est){ est.style.display='none'; est.innerHTML=''; }
  var form=document.getElementById('ata-form'); if(form) form.style.display='';
}
function _mostrarEstadoConcluida(){
  var cod=_codigoAta(_numeroAta,_gv('a-data'));
  var form=document.getElementById('ata-form'); if(form) form.style.display='none';
  var est=document.getElementById('ata-concluida-estado'); if(!est) return;
  est.style.display='';
  est.innerHTML='<div class="conc-card">'+
    '<div class="conc-ok">✅ Ata '+esc(cod)+' concluída com sucesso!</div>'+
    '<div class="conc-txt">A reunião foi registrada. Quando a próxima reunião acontecer, inicie uma nova ata.</div>'+
    (_podeEditar()?'<button class="btn btn-emp" onclick="iniciarNovaReuniao()">＋ Iniciar nova reunião</button>':'')+
    '<div class="conc-sub">Esta ata fica disponível no Histórico.</div>'+
  '</div>';
}
// Inicia uma nova reunião a partir do estado de conclusão (sem confirmação:
// não há ata aberta em edição para perder). Reseta o cronômetro e abre ata em branco.
async function iniciarNovaReuniao(){
  if(!_podeEditar()) return;
  crZerar();
  await novaAta();
}
function _gv(id){ var e=document.getElementById(id); return e? e.value : ''; }
function _sv(id,v){ var e=document.getElementById(id); if(e) e.value=(v==null?'':v); }
function _dataBR(d){ if(!d) return '—'; try{ return new Date(String(d).slice(0,10)+'T12:00:00').toLocaleDateString('pt-BR'); }catch(e){ return d; } }
function _hoje(){ return new Date().toISOString().slice(0,10); }
function _aplicarTema(nc){ document.body.classList.remove('empresa-tema-tecfusion','empresa-tema-fortex'); var n=(nc||'').toLowerCase(); if(n.includes('tecfusion')) document.body.classList.add('empresa-tema-tecfusion'); else if(n.includes('fortex')) document.body.classList.add('empresa-tema-fortex'); }
function _iniciais(nome){ var n=(nome||'').toLowerCase(); if(n.includes('tecfusion'))return 'TC'; if(n.includes('fortex'))return 'FX'; var p=(nome||'').trim().split(/\s+/).filter(Boolean); if(p.length>=2)return (p[0][0]+p[1][0]).toUpperCase(); return ((nome||'—').trim().slice(0,2).toUpperCase())||'—'; }

// status do indicador conforme o sentido da meta
function _statusInd(atual, meta, sentido){
  if(atual==null||meta==null||atual===''||meta==='') return null;
  var a=Number(atual), m=Number(meta);
  if(isNaN(a)||isNaN(m)) return null;
  var ok=(sentido==='maior')?(a>=m):(a<=m);
  if(ok) return 'na_meta';
  return a<m ? 'abaixo' : 'acima';
}
function _statusBadge(st){
  if(st==='na_meta') return '<span class="badge bg-ok">Na meta</span>';
  if(st==='abaixo')  return '<span class="badge bg-fora">Abaixo</span>';
  if(st==='acima')   return '<span class="badge bg-fora">Acima</span>';
  return '<span class="badge" style="background:var(--bg3);color:var(--text3)">—</span>';
}

// ── Boot ──
async function _onTrocaEmpresa(d){
  // Ignora SET_EMPRESA repetido para a MESMA empresa (evita recarga concorrente).
  if(_empresaAtiva && _empresaAtiva.id===d.empresaId) return;
  _empresaAtiva={ id:d.empresaId, nome:d.empresaNome||'', nome_curto:d.empresaNomeCurto||'' };

// ── Assuntos da reunião anterior ──
// Quebra a conclusão da ata anterior em itens (1 por linha não-vazia).
function _assuntosDaConclusao(txt){
  if(!txt) return [];
  return String(txt).split(/\r?\n/).map(function(l){
    return l.replace(/^[\s]*[-•*]\s+/,'').trim();
  }).filter(function(l){ return l!==''; });
}
// Busca a ÚLTIMA ata salva da empresa e pré-popula os assuntos (todos pendentes).
// Só LÊ a ata anterior — nunca a sobrescreve.
async function _carregarAssuntosAnteriores(){
  _assForm=[];

var _ASS_CICLO={ pendente:'resolvido', resolvido:'nao_resolvido', nao_resolvido:'pendente' };
function _assRowCls(st){ return st==='resolvido'?'ass-ok':(st==='nao_resolvido'?'ass-no':'ass-pend'); }
function _assStLabel(st){ return st==='resolvido'?'✅ Resolvido':(st==='nao_resolvido'?'❌ Não resolvido':'⏳ Pendente'); }
function _renderAssuntos(editavel){
  var elP=document.getElementById('ata-assuntos-placar');

  if(!el) return;
  var nOk=0,nNo=0,nPend=0;
  _assForm.forEach(function(a){ if(a.status==='resolvido')nOk++; else if(a.status==='nao_resolvido')nNo++; else nPend++; });

function ciclarAssunto(i){ if(!_editavelAta()||!_assForm[i]) return; _assForm[i].status=_ASS_CICLO[_assForm[i].status||'pendente']||'pendente'; _renderAssuntos(_editavelAta()); }
function excluirAssunto(i){ if(!_editavelAta()||i<0||i>=_assForm.length) return; _assForm.splice(i,1); _renderAssuntos(_editavelAta()); }
function addAssunto(){

// Bloco read-only de assuntos (usado no histórico / snapshot da reunião).
function _blocoAssuntos(arr){

async function salvarAta(){
  if(!_podeEditar()||!_empresaAtiva){ return; }
  var sb=_sb(); if(!sb) return;
  var btn=document.getElementById('btn-salvar-ata'); btn.disabled=true; btn.textContent='Salvando…';
  var ata={
    empresa_id:_empresaAtiva.id,
    data_reuniao:_gv('a-data')||_hoje(),
    anfitriao:_gv('a-anfitriao')||null,
    participantes:_gv('a-participantes')||null,
    novidades:_gv('a-novidades')||null,
    restricoes:_gv('a-restricoes')||null,
    conclusao:_gv('a-conclusao')||null,
    status:_gv('a-status')||'aberta',
    duracao_segundos:_elapsed||0,
    updated_at:new Date().toISOString()
  };
  try{
    var rid=_ataId;
    if(rid){
      var u=await sb.from('reuniao_radar').update(ata).eq('id',rid); if(u.error) throw u.error;
      // Remove os indicadores antigos ANTES de inserir os novos. Checa erro:
      // se o delete falhar, aborta (não insere por cima) p/ evitar duplicacao.
      var del=await sb.from('reuniao_radar_indicadores').delete()
        .eq('reuniao_id',rid).eq('empresa_id',_empresaAtiva.id);
      if(del.error) throw del.error;
      // Mesmo padrão seguro para os assuntos: delete checado antes de reinserir.
      var delA=await sb.from('reuniao_radar_assuntos').delete()
        .eq('reuniao_id',rid).eq('empresa_id',_empresaAtiva.id);
      if(delA.error) throw delA.error;
    } else {
      // Número sequencial por empresa, reiniciando por ano — calculado UMA vez, no insert.
      var anoAta=parseInt(String(ata.data_reuniao).slice(0,4),10);
      var prox=1;
      try{
        var cnt=await sb.from('reuniao_radar').select('id',{count:'exact',head:true})
          .eq('empresa_id',_empresaAtiva.id)
          .gte('data_reuniao',anoAta+'-01-01').lt('data_reuniao',(anoAta+1)+'-01-01');
        if(!cnt.error && typeof cnt.count==='number') prox=cnt.count+1; else prox=null;
      }catch(e){ prox=null; } // falha degrada: salva sem número
      if(prox!=null) ata.numero_ata=prox;
      var ins=await sb.from('reuniao_radar').insert(ata).select('id,numero_ata').single(); if(ins.error) throw ins.error;
      rid=ins.data.id; _ataId=rid; _numeroAta=(ins.data.numero_ata!=null?ins.data.numero_ata:prox);
    }
    // Dedup defensivo: no máximo 1 indicador por meta (meta_id, senão meta_titulo).
    var _vistos={};
    var indUnicos=_indForm.filter(function(it){
      var k=String((it.meta_id||it.meta_titulo||'')).trim();
      if(!k) return true;
      if(_vistos[k]) return false;
      _vistos[k]=true; return true;
    });
    _indForm=indUnicos; // reflete a lista limpa na tela
    if(indUnicos.length){
      var rows=indUnicos.map(function(it,i){
        return { reuniao_id:rid, empresa_id:_empresaAtiva.id, meta_id:it.meta_id||null,
          meta_titulo:it.meta_titulo||null, valor_atual:(it.valor_atual||null), valor_meta:(it.valor_meta||null),
          status_indicador:it.status_indicador||null, desafio_plano:it.desafio_plano||null, ordem:i+1 };
      });
      var ri=await sb.from('reuniao_radar_indicadores').insert(rows); if(ri.error) throw ri.error;
    }
    // Assuntos: dedup defensivo (texto não-vazio, sem repetição exata), reordena 1..N.
    var _vA={};
    var assUnicos=_assForm.filter(function(a){
      var t=String(a.texto||'').trim(); if(!t) return false;
      var k=t.toLowerCase(); if(_vA[k]) return false; _vA[k]=true; return true;
    });
    _assForm=assUnicos; // reflete a lista limpa na tela
    if(assUnicos.length){
      var rowsA=assUnicos.map(function(a,i){
        return { reuniao_id:rid, empresa_id:_empresaAtiva.id,
          texto:String(a.texto).trim(), status:a.status||'pendente', ordem:i+1 };
      });
      var ra=await sb.from('reuniao_radar_assuntos').insert(rowsA); if(ra.error) throw ra.error;
    }
    _ataConcluida=(ata.status==='concluida');
    _renderIndicadores(_editavelAta());
    _renderAssuntos(_editavelAta());
    _renderCodigoAta();
    _aplicarTravaAta();
    btn.disabled=false; btn.textContent='Salvar ata';
    await carregarHistorico();
    if(_ataConcluida){
      // Opção A: fecha a ata atual e mostra o estado de "aguardando nova reunião".
      _mostrarEstadoConcluida();
    } else {
      // Rascunho (aberta): continua na ata editável, como hoje.
      _mostrarFormAta();
      alert('Ata salva.');
    }
  }catch(e){ alert('Erro ao salvar ata: '+(e&&e.message||'')); btn.disabled=false; btn.textContent='Salvar ata'; }
}

// ── ABA 3: Histórico ──
var _histToken=0; // anti-concorrência: descarta respostas de cargas antigas
async function carregarHistorico(){
  var sb=_sb();
  if(!sb||!_empresaAtiva){ _reunioes=[]; _indByReuniao={}; _assByReuniao={}; renderHistorico(); return; }
  var token=++_histToken;
  try{
    var rr=await sb.from('reuniao_radar').select('*').eq('empresa_id',_empresaAtiva.id).order('data_reuniao',{ascending:false});
    var ri=await sb.from('reuniao_radar_indicadores').select('*').eq('empresa_id',_empresaAtiva.id).order('ordem',{ascending:true});
    var ra=await sb.from('reuniao_radar_assuntos').select('*').eq('empresa_id',_empresaAtiva.id).order('ordem',{ascending:true});
    if(token!==_histToken) return; // outra carga começou: descarta este resultado
    // Monta em estruturas LOCAIS e atribui de uma vez (evita race entre cargas concorrentes).
    var listaLocal=(!rr.error&&Array.isArray(rr.data))?rr.data:[];
    var mapaLocal={};
    (!ri.error&&Array.isArray(ri.data)?ri.data:[]).forEach(function(x){ (mapaLocal[x.reuniao_id]=mapaLocal[x.reuniao_id]||[]).push(x); });
    var mapaAssLocal={};
    (!ra.error&&Array.isArray(ra.data)?ra.data:[]).forEach(function(x){ (mapaAssLocal[x.reuniao_id]=mapaAssLocal[x.reuniao_id]||[]).push(x); });
    _reunioes=listaLocal;
    _indByReuniao=mapaLocal;
    _assByReuniao=mapaAssLocal;
  }catch(e){ if(token===_histToken){ _reunioes=[]; _indByReuniao={}; _assByReuniao={}; } }
  if(token===_histToken && _aba==='hist') renderHistorico();
}
function renderHistorico(){
  var el=document.getElementById('hist-lista'); if(!el) return;
  document.getElementById('hist-detalhe').innerHTML='';
  el.style.display='';
  var q=(_gv('hist-busca')||'').toLowerCase().trim();
  var lista=_reunioes.filter(function(r){
    if(!q) return true;
    return [r.data_reuniao,r.anfitriao,r.participantes,r.novidades,r.restricoes,r.conclusao].join(' ').toLowerCase().indexOf(q)>=0;
  });
  if(!lista.length){ el.innerHTML='<div class="vazio">Nenhuma reunião registrada.</div>'; return; }
  el.innerHTML=lista.map(function(r){
    var inds=_indByReuniao[r.id]||[];
    var fora=inds.filter(function(x){return x.status_indicador&&x.status_indicador!=='na_meta';}).length;
    var stTxt = r.status==='concluida'?'🔒 Concluída':'Aberta';
    return '<div class="hist-item" onclick="abrirAta(\''+r.id+'\')">'+
      '<div><div class="hist-d">'+esc(_codigoAta(r.numero_ata,r.data_reuniao))+'</div><div class="hist-sub">Anfitrião: '+esc(r.anfitriao||'—')+' · '+stTxt+'</div></div>'+
      '<div style="display:flex;align-items:center;gap:.6rem">'+
        '<div class="hist-sub" style="text-align:right">'+inds.length+' indicador(es)<br>'+(fora?('<span style="color:var(--red)">'+fora+' fora da meta</span>'):'<span style="color:var(--green)">todos na meta</span>')+'</div>'+
        (_ehDono()?'<button class="hist-del" title="Excluir ata" onclick="event.stopPropagation();excluirAtaHist(\''+r.id+'\')">🗑️</button>':'')+
      '</div>'+
    '</div>';
  }).join('');
}

  function bloco(t,v){ return '<div class="sec"><div class="sec-t">'+t+'</div><div class="ro-txt">'+(v?esc(v):'—')+'</div></div>'; }
  var det='<div class="acoes no-print" style="justify-content:space-between">'+

    '<div class="sec"><div class="sec-t">Indicadores da semana (snapshot)</div>'+
      (inds.length?'<div style="overflow-x:auto"><table class="tbl"><thead><tr><th>Indicador</th><th>Atual</th><th>Meta</th><th>Status</th><th>Desafio / Plano</th></tr></thead><tbody>'+linhas+'</tbody></table></div>':'<div class="vazio">Sem indicadores registrados.</div>')+
    '</div>'+
    _blocoAssuntos(assuntos)+

    bloco('Onde estamos presos (restrições)',r.restricoes)+

  document.getElementById('hist-detalhe').innerHTML=det;
}
function reabrirAta(id){
  var r=_reunioes.find(function(x){return x.id===id;}); if(!r) return;
  _ataId=id; _numeroAta=(r.numero_ata!=null?r.numero_ata:null); _ataConcluida=(r.status==='concluida');
  _sv('a-data',(r.data_reuniao||'').slice(0,10)); _sv('a-anfitriao',r.anfitriao); _sv('a-participantes',r.participantes);
  _sv('a-status',r.status||'aberta'); _sv('a-novidades',r.novidades); _sv('a-restricoes',r.restricoes); _sv('a-conclusao',r.conclusao);
  // Dedup defensivo: 1 indicador por meta (rede de segurança caso venha duplicado).
  var _v={};
  _indForm=(_indByReuniao[id]||[]).filter(function(it){
    var k=String(it.meta_id||it.meta_titulo||'').trim();
    if(!k) return true; if(_v[k]) return false; _v[k]=true; return true;
  }).map(function(it){
    return { meta_id:it.meta_id, meta_titulo:it.meta_titulo, valor_atual:it.valor_atual||'', valor_meta:it.valor_meta||'', unidade:'', status_indicador:it.status_indicador, desafio_plano:it.desafio_plano||'' };
  });
  _renderIndicadores(_editavelAta());
  // Carrega os assuntos salvos (snapshot) — build local + dedup defensivo por texto.
  var _vt={};
  _assForm=(_assByReuniao[id]||[]).filter(function(a){
    var t=String(a.texto||'').trim(); if(!t) return false;
    var k=t.toLowerCase(); if(_vt[k]) return false; _vt[k]=true; return true;
  }).map(function(a){ return { texto:String(a.texto).trim(), status:a.status||'pendente' }; });
  _renderAssuntos(_editavelAta());
  var bN=document.getElementById('btn-nova-ata'); if(bN) bN.style.display=_podeEditar()?'inline-flex':'none';
  _renderCodigoAta();
  _aplicarTravaAta();
  _mostrarFormAta();
  trocarAba('ata');
}
// Reabre uma ata CONCLUÍDA (só dono): volta status p/ 'aberta' no banco e abre para edição.
async function reabrirAtaConcluida(id){
  if(!_ehDono()) return;
  var r=_reunioes.find(function(x){return x.id===id;}); if(!r) return;
  var cod=_codigoAta(r.numero_ata,r.data_reuniao);
  if(!confirm('Reabrir a ata '+cod+'? Ela voltará para o status Aberta e poderá ser editada.')) return;
  var sb=_sb(); if(!sb||!_empresaAtiva) return;
  try{
    var u=await sb.from('reuniao_radar').update({status:'aberta',updated_at:new Date().toISOString()})
      .eq('id',id).eq('empresa_id',_empresaAtiva.id);
    if(u.error) throw u.error;
    await carregarHistorico();   // _reunioes reflete o novo status 'aberta'
    reabrirAta(id);              // carrega no editor, já destravado
  }catch(e){ alert('Erro ao reabrir a ata: '+(e&&e.message||'')); }
}
// Exclui uma ata (só dono). Cascade apaga indicadores e assuntos vinculados.
async function excluirAtaHist(id){
  if(!_ehDono()) return;
  var r=_reunioes.find(function(x){return x.id===id;}); if(!r) return;
  var cod=_codigoAta(r.numero_ata,r.data_reuniao);
  if(!confirm('Excluir a ata '+cod+'? Esta ação não pode ser desfeita e remove a ata e seus registros.')) return;
  var sb=_sb(); if(!sb||!_empresaAtiva) return;
  try{
    var del=await sb.from('reuniao_radar').delete().eq('id',id).eq('empresa_id',_empresaAtiva.id);
    if(del.error) throw del.error;
    if(_ataId===id){ _ataId=null; _numeroAta=null; } // se era a ata em edição, vira nova
    alert('Ata '+cod+' excluída.');
    await carregarHistorico();
    renderHistorico(); // fecha o detalhe (se aberto) e volta para a lista
  }catch(e){ alert('Erro ao excluir a ata: '+(e&&e.message||'')); }
}

// ── Cronômetro ──
var _elapsed=0, _running=false, _tick=null;
function _crBase(){ return (parseInt(_gv('cr-min'),10)||0)*60; }
function _crModo(){ return _gv('cr-modo')||'reg'; }
function _crSec(){ return _crModo()==='reg' ? (_crBase()-_elapsed) : _elapsed; }
function _fmtMMSS(s){ var neg=s<0; s=Math.abs(s); var m=Math.floor(s/60), ss=s%60; return (neg?'-':'')+(m<10?'0':'')+m+':'+(ss<10?'0':'')+ss; }
function crRender(){ var d=document.getElementById('cr-display'); if(!d) return; var s=_crSec(); d.textContent=_fmtMMSS(s); d.style.color=(_crModo()==='reg'&&s<0)?'var(--red)':''; }
function crToggle(){
  if(_running){ clearInterval(_tick); _running=false; document.getElementById('cr-play').textContent='▶ Iniciar'; }
  else { _running=true; document.getElementById('cr-play').textContent='⏸ Pausar'; _tick=setInterval(function(){ _elapsed++; crRender(); },1000); }
}
function crZerar(){ clearInterval(_tick); _running=false; _elapsed=0; var b=document.getElementById('cr-play'); if(b) b.textContent='▶ Iniciar'; crRender(); }

// Inicia uma ata nova do zero (com confirmação) — reusa crZerar()/novaAta().
async function iniciarNovaAta(){
  if(!_podeEditar()) return;
  if(!confirm('Começar uma nova ata? As alterações não salvas nesta ata serão perdidas.')) return;
  crZerar();        // reseta o cronômetro: para se rodando, zera o tempo, volta ao valor inicial
  await novaAta();  // zera _ataId, data de hoje, metas atuais, assuntos da ata anterior
}

// ── Impressão ──
function imprimirAta(cod){
  var cab=document.getElementById('print-cab'), rod=document.getElementById('print-rod');
  var emp=(_empresaAtiva&&(_empresaAtiva.nome_curto||_empresaAtiva.nome))||'';
  // cod (string) vem do histórico (ata aberta); sem arg, usa a ata atual.
  var codigo=(typeof cod==='string'&&cod)?cod:_codigoAta(_numeroAta,_gv('a-data')||(_reunioes[0]&&_reunioes[0].data_reuniao));
  if(cab) cab.innerHTML='<div class="pc-logo">TECFUSION</div><div class="pc-tool">Reunião de Radar — '+esc(emp)+(codigo?' · '+esc(codigo):'')+'</div>';
  if(rod) rod.textContent='Tecfusion © 2026 — Reunião de Radar';
  window.print();
}

window.addEventListener('message', function(e){
  if(!e.data||!e.data.type) return;
  if(e.data.type==='SET_EMPRESA') _onTrocaEmpresa(e.data);
  if(e.data.type==='SET_TEMA') document.body.classList.toggle('light', e.data.tema==='light');
});

_renderComoFunciona();
