<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestão à Vista</title>
<style>
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;
  --border:#30363d;--border2:#484f58;
  --text:#e6edf3;--text2:#8b949e;--text3:#6e7681;
  --accent:#f0a500;--green:#3fb950;--blue:#58a6ff;
  --red:#f85149;--amber:#d4a017;--purple:#bc8cff;
  --r:8px;--r2:6px;
  --emp-cor:#f0a500;--emp-cor-2:#f0a500;
  --emp-bg:rgba(240,165,0,.10);--emp-bdr:rgba(240,165,0,.28);
}
body.light{
  --bg:#f5f7fb;--bg2:#ffffff;--bg3:#eef2f7;
  --border:#d5dce6;--border2:#bfc9d7;
  --text:#111827;--text2:#4b5563;--text3:#6b7280;
  --accent:#d97706;--green:#15803d;--blue:#2563eb;--red:#dc2626;--amber:#b45309;
}
body.empresa-tema-tecfusion{ --emp-cor:#4DB748;--emp-cor-2:#4DB748;--emp-bg:rgba(77,183,72,.10);--emp-bdr:rgba(77,183,72,.32); }
body.empresa-tema-fortex{ --emp-cor:#F5A623;--emp-cor-2:#F5A623;--emp-bg:rgba(245,166,35,.10);--emp-bdr:rgba(245,166,35,.32); }
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

.wrap{max-width:1240px;margin:0 auto;padding:1.1rem}

/* Painel de KPIs */
#kpis-painel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:.9rem 1rem;margin-bottom:1rem}
.kpis-head{display:flex;align-items:center;justify-content:space-between;gap:.6rem;margin-bottom:.6rem}
.kpis-titulo{font-size:.95rem;font-weight:800;color:var(--emp-cor)}
.kpis-bloco{margin-bottom:.8rem}
.kpis-bloco:last-child{margin-bottom:0}
.kpis-bloco-t{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:.45rem}
.kpis-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:.6rem}
.kpi-c{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:.6rem .7rem}
.kpi-c-l{font-size:.66rem;color:var(--text3);text-transform:uppercase;letter-spacing:.03em;margin-bottom:.25rem}
.kpi-c-v{font-size:1.35rem;font-weight:800;color:var(--emp-cor);line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kpi-c-s{font-size:.65rem;color:var(--text3);margin-top:.2rem}
.kpi-c-link{cursor:pointer;transition:border-color .15s}
.kpi-c-link:hover{border-color:var(--emp-cor)}

/* Funil Comercial (espelho) */
#funil-painel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:.9rem 1rem;margin-bottom:1rem;color:var(--text)}
#funil-svg{overflow-x:auto}
#funil-vazio{color:var(--text3);font-style:italic;font-size:.86rem;padding:1rem 0}
/* Fechamentos por Mês */
#fechmes-painel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:.9rem 1rem;margin-top:1rem}
.fm-head{display:flex;align-items:center;justify-content:space-between;gap:.6rem;margin-bottom:.6rem}
.fm-titulo{font-size:.95rem;font-weight:800;color:var(--emp-cor)}
.fm-titulo small{color:var(--text3);font-weight:600;font-size:.7rem;margin-left:.3rem}
#fechmes-kpis{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:.75rem}
#fechmes-kpis .kpi-c{flex:1;min-width:140px}
#fechmes-chart{width:100%;overflow-x:auto}
.hdr{display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;margin-bottom:1rem;padding-bottom:.8rem;border-bottom:1px solid var(--border)}
.hdr-l{display:flex;align-items:center;gap:.7rem}
.hdr-mk{width:40px;height:40px;border-radius:10px;background:var(--emp-cor);display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:1rem;flex-shrink:0}
.hdr-nome{font-size:1.15rem;font-weight:800;line-height:1.1}
.hdr-sub{font-size:.72rem;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.hdr-acoes{display:flex;gap:.5rem;flex-wrap:wrap}

.btn{border:none;border-radius:var(--r2);padding:.45rem .85rem;font-size:.8rem;font-weight:700;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:.35rem}
.btn-emp{background:var(--emp-cor);color:#fff}.btn-emp:hover{filter:brightness(1.08)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}.btn-ghost:hover{color:var(--text);border-color:var(--text2)}
.btn-sm{padding:.3rem .6rem;font-size:.74rem}
.btn-danger{background:transparent;border:1px solid var(--red);color:var(--red)}.btn-danger:hover{background:var(--red);color:#fff}

.cols{display:block}

/* Lista de metas — grid horizontal no topo */
.lista{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:.6rem;margin-bottom:1rem}
.meta-card{background:var(--bg2);border:1px solid var(--border);border-left:4px solid var(--emp-cor);border-radius:var(--r);padding:.7rem .8rem;cursor:pointer;text-align:left;font-family:inherit;color:var(--text);transition:border-color .12s}
.meta-card:hover{border-color:var(--border2)}
.meta-card.on{background:var(--emp-bg);border-left-color:var(--emp-cor);border-color:var(--emp-bdr)}
.meta-card-tit{font-size:.88rem;font-weight:700;margin-bottom:.3rem}
.meta-card-meta{font-size:.7rem;color:var(--text3);display:flex;justify-content:space-between;gap:.4rem;margin-top:.4rem}
.prog{height:7px;background:var(--bg3);border-radius:6px;overflow:hidden;margin:.35rem 0}
.prog-bar{height:100%;background:var(--emp-cor);border-radius:6px}
.badge{display:inline-block;font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.04em;padding:.12rem .45rem;border-radius:20px}

/* Detalhe */
.det{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.1rem;min-height:300px}
.abas{display:flex;gap:.3rem;border-bottom:1px solid var(--border);margin-bottom:1rem;flex-wrap:wrap}
.aba{padding:.45rem .8rem;border:none;background:transparent;color:var(--text3);font-size:.78rem;font-weight:700;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent}
.aba.on{color:var(--emp-cor);border-bottom-color:var(--emp-cor)}
.det-titulo{font-size:1.15rem;font-weight:800;margin-bottom:.2rem}
.det-linha{font-size:.8rem;color:var(--text2);margin-bottom:.15rem}
.det-acoes{display:flex;gap:.5rem;flex-wrap:wrap;margin:.8rem 0}

/* SMART Kanban (5 colunas) */
.smart-kanban{display:grid;grid-template-columns:repeat(5,1fr);gap:.6rem;margin-top:.8rem}
@media(max-width:880px){ .smart-kanban{grid-template-columns:repeat(2,1fr)} }
@media(max-width:520px){ .smart-kanban{grid-template-columns:1fr} }
.sk-col{display:flex;flex-direction:column;gap:.5rem}
.sk-head{border-radius:var(--r2);padding:.5rem .6rem;color:#fff;text-align:center}
.sk-letter{font-size:1.5rem;font-weight:900;line-height:1}
.sk-name{font-size:.64rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;margin-top:.18rem;opacity:.95}
.sk-card{background:var(--bg3);border:1px solid var(--border);border-top:3px solid var(--sk-c,var(--emp-cor));border-radius:var(--r2);padding:.6rem .7rem;font-size:.82rem;line-height:1.5;white-space:pre-wrap;flex:1}
.valbox{display:flex;align-items:baseline;gap:.5rem;margin:.6rem 0;font-size:.9rem;flex-wrap:wrap}
.valbox b{font-size:1.5rem;color:var(--emp-cor)}

/* 5W2H — colunas lado a lado (estilo PDF) */
.w5-cols{display:flex;gap:.7rem;overflow-x:auto;padding-bottom:.4rem;margin-top:.4rem}
.w5-col{flex:0 0 230px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;display:flex;flex-direction:column}
.w5-col-h{padding:.6rem .7rem;border-bottom:1px solid var(--border);text-align:center}
.w5-col-num{font-size:1.7rem;font-weight:900;color:var(--emp-cor);line-height:1}
.w5-col-tit{font-size:.76rem;font-weight:800;text-transform:uppercase;margin-top:.25rem;min-height:2.2em;line-height:1.2}
.w5-col-body{padding:.6rem .7rem;display:flex;flex-direction:column;gap:.55rem;flex:1}
.w5-badge{display:inline-block;font-size:.58rem;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:#fff;border-radius:4px;padding:.13rem .45rem;margin-bottom:.22rem}
.w5-fld-v{font-size:.8rem;line-height:1.45;white-space:pre-wrap;color:var(--text);min-height:1.1em}
.w5-col-actions{padding:.4rem .7rem;border-top:1px solid var(--border);display:flex;gap:.3rem;justify-content:flex-end}

/* PDCA 2x2 colorido — sentido horário: P(TL) D(TR) C(BR) A(BL) */
.pdca-banner{background:#4DB748;color:#fff;border-radius:var(--r);padding:.7rem .9rem;margin-bottom:.8rem;font-weight:700;font-size:.9rem}
.pdca{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}
@media(max-width:680px){ .pdca{grid-template-columns:1fr} }
.quad{border-radius:var(--r);overflow:hidden;color:var(--text);background:var(--bg2);border:1px solid var(--border)}
.quad-h{display:flex;align-items:baseline;gap:.5rem;color:#fff;padding:.55rem .85rem}
.quad-body{padding:.85rem .95rem}
.quad-letter{font-size:1.7rem;font-weight:900;line-height:1}
.quad-name{font-size:1rem;font-weight:800}
.quad-sub{font-size:.7rem;color:var(--text3);margin:0 0 .7rem}
.quad-q-p .quad-h{background:#4DB748}
.quad-q-d .quad-h{background:#166534}
.quad-q-c .quad-h{background:#2563eb}
.quad-q-a .quad-h{background:#f97316}
.pdca-fld{margin-bottom:.55rem}
.pdca-fld label{font-size:.66rem;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:.2rem}
.pdca-fld textarea{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:var(--r2);color:var(--text);font-family:inherit;font-size:.82rem;line-height:1.5;padding:.45rem .55rem;resize:vertical;min-height:58px}
.pdca-fld textarea::placeholder{color:var(--text3)}
.pdca-ro{font-size:.84rem;line-height:1.5;white-space:pre-wrap;color:var(--text)}
.pdca-plan-list{margin:.3rem 0 0 1.1rem;font-size:.82rem;line-height:1.5}

/* Radar */
.tbl{width:100%;table-layout:fixed;border-collapse:collapse;font-size:.82rem}
.tbl th{text-align:left;padding:14px 12px;background:#4DB748;color:#fff;font-size:.68rem;text-transform:uppercase;letter-spacing:.03em;white-space:nowrap;border:1px solid rgba(255,255,255,.2)}
.tbl td{padding:14px 12px;border:1px solid var(--border);vertical-align:top}
.tbl td.rad-ref{background:var(--bg2);color:var(--text);font-weight:700;white-space:normal;word-break:break-word}
.rad-ref-nome{line-height:1.35}
.rad-ref-acoes{display:flex;gap:.3rem;margin-top:.5rem}
.rad-ref-acoes .btn{font-size:.68rem;padding:.15rem .4rem}
.tbl tr.media td{background:#2563eb;color:#fff;font-weight:800;border-color:rgba(255,255,255,.2)}
.tbl textarea.rad-act{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:var(--r2);color:var(--text);font-family:inherit;font-size:.78rem;line-height:1.4;padding:.35rem .45rem;resize:vertical;min-height:38px}
.rad-legenda{display:flex;gap:1.2rem;flex-wrap:wrap;font-size:.74rem;color:var(--text2);margin-top:.6rem}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:flex-start;justify-content:center;padding:1.5rem 1rem;z-index:1000;overflow-y:auto}
.modal-bg.on{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);width:100%;max-width:720px;padding:1.2rem}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.modal-titulo{font-size:1.05rem;font-weight:800;color:var(--emp-cor)}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}
.fld{margin-bottom:.2rem}
.fld.full{grid-column:1/-1}
.fld label{font-size:.68rem;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:.22rem}
.fld input,.fld select,.fld textarea{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:var(--r2);color:var(--text);font-family:inherit;font-size:.84rem;padding:.45rem .6rem;line-height:1.5}
.fld textarea{resize:vertical;min-height:64px}
.modal-acoes{display:flex;gap:.5rem;justify-content:flex-end;margin-top:1rem;flex-wrap:wrap}
.estado{padding:2.2rem;text-align:center;color:var(--text3);font-size:.9rem}
.vazio{color:var(--text3);font-style:italic;font-size:.86rem;padding:1rem 0}

/* Impressão */
#print-cab,#print-rod{display:none}
@media print{
  @page{ size:A4 landscape; margin:10mm }
  *{ -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important }
  html,body{ background:#fff !important; color:#111 !important; height:auto !important }
  .hdr,.lista,.abas,.det-acoes,.btn,.modal-bg,#kpis-painel,#funil-painel{ display:none !important }
  .cols{ display:block !important }
  .det{ border:none !important; padding:0 !important; min-height:0 !important; width:100% !important }
  .estado,.vazio{ color:#444 !important }

  /* Cabeçalho/rodapé em fluxo normal (evita página em branco extra) */
  #print-cab{ display:block !important; border-bottom:3px solid #4DB748; padding-bottom:6px; margin-bottom:10px }
  #print-cab .pc-logo{ font-weight:900; font-size:16px; color:#4DB748; letter-spacing:1px }
  #print-cab .pc-tool{ font-size:12px; font-weight:700; margin-top:2px; color:#111 }
  #print-cab .pc-meta{ font-size:10px; color:#333; margin-top:4px }
  #print-rod{ display:block !important; margin-top:10px; text-align:center; font-size:9px; color:#666; border-top:1px solid #ddd; padding-top:4px }

  /* ── SMART: cabeçalho da letra colorido (inline), card branco ── */
  .smart-kanban{ page-break-inside:avoid }
  .sk-col{ page-break-inside:avoid }
  .sk-head{ color:#fff !important }
  .sk-card{ background:#fff !important; color:#111 !important; border:1px solid #ccc !important }
  .det-titulo{ color:#111 !important }
  .det-linha{ color:#333 !important }

  /* ── 5W2H: colunas lado a lado, badges coloridos, corpo branco ── */
  .w5-cols{ overflow:visible !important; flex-wrap:wrap }
  .w5-col{ page-break-inside:avoid; background:#fff !important; border:1px solid #ccc !important }
  .w5-col-h{ background:#fff !important }
  .w5-col-tit{ color:#111 !important }
  .w5-fld-v{ color:#111 !important }

  /* ── PDCA: cabeçalho do quadrante colorido, corpo branco; cabe em 1 página ── */
  .pdca-banner{ color:#fff !important }
  .pdca{ gap:.4rem !important; page-break-inside:avoid }
  .quad{ background:#fff !important; color:#111 !important; border:1px solid #ccc !important; padding:0 0 .4rem !important; page-break-inside:avoid }
  .quad-body{ padding:0 !important }
  .quad-h{ color:#fff !important; padding:.25rem .5rem !important; margin-bottom:.3rem }
  .quad-q-p .quad-h{ background:#4DB748 !important }
  .quad-q-d .quad-h{ background:#166534 !important }
  .quad-q-c .quad-h{ background:#2563eb !important }
  .quad-q-a .quad-h{ background:#f97316 !important }
  .quad-letter{ font-size:1.2rem !important }
  .quad-name{ font-size:.85rem !important }
  .quad-sub{ color:#444 !important; opacity:1 !important; padding:0 .5rem; margin-bottom:.35rem }
  .quad .pdca-fld{ padding:0 .5rem; margin-bottom:.3rem }
  .pdca-fld label{ color:#333 !important; opacity:1 !important }
  .pdca-fld textarea, .pdca-ro{ background:#fff !important; color:#111 !important; border:1px solid #ccc !important; min-height:30px !important }
  .pdca-plan-list{ color:#111 !important }

  /* ── Radar: só cabeçalho verde; 1ª coluna e TOTAL/MÉDIA neutras; bordas finas ── */
  .tbl tr{ page-break-inside:avoid }
  .tbl th{ background:#4DB748 !important; color:#fff !important; border:1px solid #cfcfcf !important }
  .tbl td{ border:1px solid #cfcfcf !important; color:#111 !important }
  .tbl td.rad-ref{ background:#fff !important; color:#111 !important }
  .tbl tr.media td{ background:#f0f0f0 !important; color:#111 !important; border-color:#cfcfcf !important }
  .tbl textarea.rad-act{ background:#fff !important; color:#111 !important; border:1px solid #ccc !important }
  .rad-legenda{ color:#333 !important }

  /* ── Isolamento de impressão: imprime APENAS o bloco marcado (.print-only) ── */
  /* Esconde os irmãos ao longo da cadeia de ancestrais (preserva o layout interno do bloco). */
  body.print-isolado .print-anc > *{ display:none !important; }
  body.print-isolado .print-anc{ display:block !important; }
  body.print-isolado .print-only{ display:block !important; }
  body.print-isolado #print-cab, body.print-isolado #print-rod{ display:block !important; }
  /* Dentro do bloco impresso, oculta controles que não devem sair no papel */
  body.print-isolado .print-only .abas,
  body.print-isolado .print-only .det-acoes,
  body.print-isolado .print-only .fm-head,
  body.print-isolado .print-only .btn{ display:none !important; }
  /* Estilo das KPIs do gráfico na impressão */
  #fechmes-kpis .kpi-c{ background:#fff !important; border:1px solid #ccc !important }
  #fechmes-kpis .kpi-c-v{ color:#111 !important }
}

</style>
</head>
<body>
<div class="wrap">
  <div id="print-cab"></div>
  <div class="hdr">
    <div class="hdr-l">
      <div class="hdr-mk" id="hdr-mk">—</div>
      <div>
        <div class="hdr-nome" id="hdr-nome">—</div>
        <div class="hdr-sub">Gestão à Vista</div>
      </div>
    </div>
    <div class="hdr-acoes">
      <button class="btn btn-emp btn-sm" id="btn-nova-meta" style="display:none" onclick="abrirModalMeta(null)">＋ Nova meta</button>
    </div>
  </div>

  <div class="cols">
    <div class="lista" id="lista-metas"><div class="vazio">Carregando…</div></div>
    <div class="det" id="detalhe"><div class="estado">Selecione uma meta para ver os detalhes.</div></div>
  </div>

  <div id="kpis-painel">
    <div class="kpis-head">
      <span class="kpis-titulo">📊 Indicadores</span>
      <button class="btn btn-ghost btn-sm" id="kpis-toggle" onclick="toggleKpis()">▼ expandir</button>
    </div>
    <div id="kpis-body" style="display:none">
      <div class="kpis-bloco"><div class="kpis-bloco-t">Resultado Financeiro</div><div class="kpis-grid" id="kpis-fin"></div></div>
      <div class="kpis-bloco"><div class="kpis-bloco-t">Comercial</div><div class="kpis-grid" id="kpis-com"></div></div>
      <div class="kpis-bloco"><div class="kpis-bloco-t">Velocidade</div><div class="kpis-grid" id="kpis-vel"></div></div>
    </div>
  </div>

  <div id="funil-painel">
    <div class="fm-head">
      <span class="fm-titulo">🔻 Funil Comercial <small id="funil-ano"></small></span>
      <button class="btn btn-ghost btn-sm" id="funil-toggle" onclick="toggleFunil()">▼ expandir</button>
    </div>
    <div id="funil-body" style="display:none"><div id="funil-svg"></div></div>
  </div>

  <div id="fechmes-painel">
    <div class="fm-head">
      <span class="fm-titulo">📅 Fechamentos por Mês <small id="fechmes-ano"></small></span>
      <div style="display:flex;gap:.4rem">
        <button class="btn btn-ghost btn-sm" id="fechmes-toggle" onclick="toggleFechmes()">▼ expandir</button>
        <button class="btn btn-ghost btn-sm" onclick="imprimirChart()">🖨️ Imprimir PDF</button>
      </div>
    </div>
    <div id="fechmes-body" style="display:none">
      <div id="fechmes-kpis"></div>
      <div id="fechmes-chart"></div>
    </div>
  </div>

  <div id="print-rod"></div>
</div>

<!-- Modal meta -->
<div class="modal-bg" id="modal-meta">
  <div class="modal">
    <div class="modal-head"><div class="modal-titulo" id="modal-meta-titulo">Nova meta</div><button class="btn btn-ghost btn-sm" onclick="fecharModal('modal-meta')">✕</button></div>
    <div class="fgrid">
      <div class="fld full"><label>Título *</label><input id="m-titulo"></div>
      <div class="fld"><label>Área</label><input id="m-area"></div>
      <div class="fld"><label>Responsável</label><input id="m-responsavel"></div>
      <div class="fld"><label>Data início</label><input id="m-data-inicio" type="date"></div>
      <div class="fld"><label>Data prazo</label><input id="m-data-prazo" type="date"></div>
      <div class="fld"><label>Valor atual</label><input id="m-valor-atual" type="number" step="any"></div>
      <div class="fld"><label>Valor meta</label><input id="m-valor-meta" type="number" step="any"></div>

<script>
// ============================================================
// Gestão à Vista — metas, plano de ação, ciclo de melhoria e radar
// por empresa ativa. Página iframe autônoma; empresa via postMessage,
// dados via window.parent.sbClient (RLS aplica).
// ============================================================

var _empresaAtiva = null;
var _metas  = [];
var _metaSelId = null;
var _acoes  = [];
var _pdca   = null;
var _radar  = [];
var _aba    = 'smart';
var _editAcaoId = null;
var _editRadarId = null;

function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function _sb(){ return (window.parent && window.parent.sbClient) ? window.parent.sbClient : null; }
function _pode(acao){ try{ return !!(window.parent && typeof window.parent.podeAcao==='function' && window.parent.podeAcao('gestao-a-vista', acao)); }catch(e){ return false; } }
function _podeEditar(){ return _pode('editar'); }
function _podePdca(){ return _pode('editar_pdca') || _pode('editar'); }
function _gv(id){ var e=document.getElementById(id); return e? e.value : ''; }
function _sv(id,v){ var e=document.getElementById(id); if(e) e.value = (v==null?'':v); }
function _numOrNull(v){ v=String(v).trim(); if(v==='') return null; var n=parseFloat(v.replace(',','.')); return isNaN(n)?null:n; }
function _dataBR(d){ if(!d) return '—'; try{ return new Date(d+'T12:00:00').toLocaleDateString('pt-BR'); }catch(e){ return d; } }
function _fmtNum(n){ if(n==null) return '—'; return (Math.round(n*100)/100).toLocaleString('pt-BR'); }

// ── Tema / header ──
function _aplicarTema(nc){ document.body.classList.remove('empresa-tema-tecfusion','empresa-tema-fortex'); var n=(nc||'').toLowerCase(); if(n.includes('tecfusion')) document.body.classList.add('empresa-tema-tecfusion'); else if(n.includes('fortex')) document.body.classList.add('empresa-tema-fortex'); }
function _iniciais(nome){ var n=(nome||'').toLowerCase(); if(n.includes('tecfusion')) return 'TC'; if(n.includes('fortex')) return 'FX'; var p=(nome||'').trim().split(/\s+/).filter(Boolean); if(p.length>=2) return (p[0][0]+p[1][0]).toUpperCase(); return ((nome||'—').trim().slice(0,2).toUpperCase())||'—'; }
function _header(emp){ var nome=(emp&&(emp.nome_curto||emp.nome))||'—'; document.getElementById('hdr-nome').textContent=nome; document.getElementById('hdr-mk').textContent=_iniciais(nome); }

// ── Painel de KPIs ──
var _kpisAberto=false;
var _FAS_GANHA=['aprovado','ganho','andamento','taf','sat','finalizado','atrasado','faturado','recebido'];
var _FAS_PIPE =['enviada','cliente_analisando','follow1','follow2','follow3','follow4','virou_budget'];

function _sf(){ try{ return (window.parent && window.parent.sbFinanceiro) ? window.parent.sbFinanceiro : (window.sbFinanceiro||null); }catch(e){ return null; } }
function _props(){ try{ return (window.parent && Array.isArray(window.parent.props)) ? window.parent.props : []; }catch(e){ return []; } }
function _money(v){ if(v==null||isNaN(v)) return '—'; return 'R$ '+Number(v).toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:0}); }
function _noMes(iso){ if(!iso) return false; var d=new Date(String(iso).slice(0,10)+'T12:00:00'); if(isNaN(d)) return false; var n=new Date(); return d.getFullYear()===n.getFullYear() && d.getMonth()===n.getMonth(); }
function _noAno(iso){ if(!iso) return false; var d=new Date(String(iso).slice(0,10)+'T12:00:00'); if(isNaN(d)) return false; return d.getFullYear()===(new Date()).getFullYear(); }
// Propostas ENVIADAS no mês corrente = tl.dtEnvio no mês/ano atual (independe da fase).
// Sem dtEnvio não conta. Mesmo predicado usado no dashboard-minha-empresa.
function _enviadasMes(ps){ return (ps||[]).filter(function(p){ var tl=p.tl||{}; return _noMes(tl.dtEnvio); }); }
function _media(arr){ if(!arr.length) return null; return arr.reduce(function(s,v){return s+v;},0)/arr.length; }
function _kpiCard(label,valor,sub,oc){ var ex=oc?' class="kpi-c kpi-c-link" onclick="'+oc+'" tabindex="0" role="button"':' class="kpi-c"'; return '<div'+ex+'><div class="kpi-c-l">'+esc(label)+'</div><div class="kpi-c-v">'+valor+'</div><div class="kpi-c-s">'+esc(sub||'')+'</div></div>'; }
// Reuso das funções globais do shell (Metas 2026) para bater 100% com aquele painel
function _pFn(name){ try{ return (window.parent && typeof window.parent[name]==='function') ? window.parent[name] : null; }catch(e){ return null; } }
function _ppGanha(p){ try{ return !!(window.parent && typeof window.parent.isPropostaGanhaOuAprovada==='function' && window.parent.isPropostaGanhaOuAprovada(p)); }catch(e){ return _FAS_GANHA.indexOf(p.fas)>=0; } }

function toggleKpis(){
  _kpisAberto=!_kpisAberto;
  var b=document.getElementById('kpis-body'); var t=document.getElementById('kpis-toggle');
  if(b) b.style.display=_kpisAberto?'':'none';
  if(t) t.textContent=_kpisAberto?'▲ recolher':'▼ expandir';
}
var _fechmesAberto=false;
function toggleFechmes(){
  _fechmesAberto=!_fechmesAberto;
  var b=document.getElementById('fechmes-body'); var t=document.getElementById('fechmes-toggle');
  if(b) b.style.display=_fechmesAberto?'':'none';
  if(t) t.textContent=_fechmesAberto?'▲ recolher':'▼ expandir';
}
// Funil Comercial (espelho) — mesma fonte do Comercial (window.parent.calcFunilComercial)
var _funilAberto=false;
function toggleFunil(){
  _funilAberto=!_funilAberto;
  var b=document.getElementById('funil-body'); var t=document.getElementById('funil-toggle');
  if(b) b.style.display=_funilAberto?'':'none';
  if(t) t.textContent=_funilAberto?'▲ recolher':'▼ expandir';
}
function renderFunil(){
  var el=document.getElementById('funil-svg'); if(!el) return;
  var elAno=document.getElementById('funil-ano');
  try{
    var calc=window.parent&&window.parent.calcFunilComercial;
    var draw=window.parent&&window.parent.funilComercialSVG;
    if(typeof calc!=='function'||typeof draw!=='function'){ el.innerHTML='<div id="funil-vazio">Funil indisponível.</div>'; return; }
    var ano; try{ ano=window.parent._anoComercialSel; }catch(e){ ano=null; }
    var data=calc(ano);
    if(elAno) elAno.textContent=(data&&data.ano==='all')?'(todos os anos)':('('+(data?data.ano:'')+')');
    el.innerHTML=draw(data, {onSlice:'abrirFunilListaGV'});
  }catch(e){ el.innerHTML='<div id="funil-vazio">Funil indisponível.</div>'; }
}
// Lista clicável do funil (modal) — usa a tabela do shell (mesma fonte/dados).
function abrirFunilListaGV(grupo){
  var body=document.getElementById('funil-lista-body'); if(!body) return;
  try{
    var ano; try{ ano=window.parent._anoComercialSel; }catch(e){ ano=null; }
    var html=(window.parent&&typeof window.parent.funilListaTabelaHTML==='function')
      ? window.parent.funilListaTabelaHTML(grupo, ano) : '<div class="vazio">Lista indisponível.</div>';
    body.innerHTML=html;
    var m=document.getElementById('funil-lista-modal'); if(m) m.classList.add('on');
  }catch(e){ body.innerHTML='<div class="vazio">Lista indisponível.</div>'; }
}
function _fecharFunilListaGV(){ var m=document.getElementById('funil-lista-modal'); if(m) m.classList.remove('on'); }
function abrirEnviadasMesGV(){
  var body=document.getElementById('env-mes-body-gv'); if(!body) return;
  var ps=_enviadasMes(_props());
  var ab=function(n){ try{ return (window.parent&&typeof window.parent.abreviarCliente==='function')?window.parent.abreviarCliente(n||''):(n||'').split(' ').slice(0,3).join(' '); }catch(e){ return n||''; } };
  var fmtV=function(v){ if(v==null||isNaN(Number(v))) return '—'; return 'R$ '+Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); };
  if(!ps.length){ body.innerHTML='<div class="vazio">Nenhuma proposta enviada no mês corrente.</div>'; }
  else{
    var rows=ps.map(function(p){ var tl=p.tl||{}; return '<tr style="border-bottom:1px solid var(--border)"><td style="padding:.4rem .5rem">'+esc(p.num||'—')+'</td><td style="padding:.4rem .5rem">'+esc(ab(p.loc||p.cli||''))+'</td><td style="padding:.4rem .5rem">'+esc(p.tit||'—')+'</td><td style="padding:.4rem .5rem;white-space:nowrap">'+esc(_dataBR(tl.dtVisita))+'</td><td style="padding:.4rem .5rem;white-space:nowrap">'+esc(_dataBR(tl.dtEnvio))+'</td><td style="padding:.4rem .5rem;text-align:right;white-space:nowrap">'+esc(fmtV(p.val))+'</td></tr>'; }).join('');
    body.innerHTML='<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:.82rem"><thead><tr style="border-bottom:2px solid var(--border)"><th style="text-align:left;padding:.4rem .5rem;font-size:.68rem;text-transform:uppercase;letter-spacing:.03em;color:var(--text3)">Nº</th><th style="text-align:left;padding:.4rem .5rem;font-size:.68rem;text-transform:uppercase;letter-spacing:.03em;color:var(--text3)">Cliente</th><th style="text-align:left;padding:.4rem .5rem;font-size:.68rem;text-transform:uppercase;letter-spacing:.03em;color:var(--text3)">Título</th><th style="text-align:left;padding:.4rem .5rem;font-size:.68rem;text-transform:uppercase;letter-spacing:.03em;color:var(--text3)">Visita</th><th style="text-align:left;padding:.4rem .5rem;font-size:.68rem;text-transform:uppercase;letter-spacing:.03em;color:var(--text3)">Envio</th><th style="text-align:right;padding:.4rem .5rem;font-size:.68rem;text-transform:uppercase;letter-spacing:.03em;color:var(--text3)">Valor</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
  }
  abrirModal('modal-env-mes-gv');
}
function _fecharEnviadasMesGV(){ fecharModal('modal-env-mes-gv'); }
// Garante aberto (não alterna) — usado pela navegação do menu
function _expandKpis(){ if(!_kpisAberto) toggleKpis(); }
function _expandFechmes(){ if(!_fechmesAberto) toggleFechmes(); }
function _scrollTo(id){
  if(id==='kpis'){ _expandKpis(); var e1=document.getElementById('kpis-painel'); if(e1) e1.scrollIntoView({behavior:'smooth',block:'start'}); }
  else if(id==='fechmes'){ _expandFechmes(); var e2=document.getElementById('fechmes-painel'); if(e2) e2.scrollIntoView({behavior:'smooth',block:'start'}); }
}

function renderKpis(){
  _renderKpisComercial();
  _renderKpisVelocidade();
  _renderKpisFinanceiro();
}

function _renderKpisComercial(){
  var el=document.getElementById('kpis-com'); if(!el) return;
  var ps=_props();
  // Contagens do mês (simples) — usa critério oficial de "ganha" (inclui em_pausa_*)
  var enviadasMes=_enviadasMes(ps);
  var fechMes    =ps.filter(function(p){ return _ppGanha(p) && _noMes(p.dtFech); });
  var carteira=ps.filter(function(p){ return _FAS_PIPE.indexOf(p.fas)>=0; }).reduce(function(s,p){ return s+(Number(p.val)||0); },0);
  // Ano: reusa as funções do shell p/ bater exatamente com o Metas 2026
  var getProps=_pFn('getPropsAnoC'), getFech=_pFn('getFechAnoC'), getRec=_pFn('getRecAnoC');
  var totalAno = getProps ? (getProps()||[]).length : null;
  var fechAno  = getFech  ? (getFech()||[]).length  : null;
  var recAno   = getRec   ? getRec()                : null;
  var conv   = (totalAno!=null && totalAno>0 && fechAno!=null) ? (fechAno/totalAno*100) : null;
  var ticket = (recAno!=null && fechAno!=null && fechAno>0)    ? (recAno/fechAno)       : null;
  el.innerHTML=
    _kpiCard('Propostas enviadas no mês', String(enviadasMes.length), 'Enviadas ao cliente no mês (por data de envio)', 'abrirEnviadasMesGV()')+
    _kpiCard('Fechamentos no mês', String(fechMes.length), 'Ganhas por data de fechamento')+
    _kpiCard('Taxa de conversão do ano', conv==null?'—':conv.toFixed(1)+'%', 'Ganhas ÷ realizadas (ano)')+
    _kpiCard('Receita no ano', recAno==null?'—':_money(recAno), 'Valor das ganhas (ano)')+
    _kpiCard('Carteira aberta', _money(carteira), 'Pipeline em aberto')+
    _kpiCard('Ticket médio do ano', ticket==null?'—':_money(ticket), 'Receita ÷ fechamentos (ano)');
}

function _renderKpisVelocidade(){
  var el=document.getElementById('kpis-vel'); if(!el) return;
  var ps=_props();
  var elab=[], gap=[], ciclo=[];
  ps.forEach(function(p){
    var tl=p.tl||{};
    var dEl=_diasEntre(tl.dtVisita||p.dat2, tl.dtEnvio); if(dEl!=null && tl.dtEnvio && (tl.dtVisita||p.dat2)) elab.push(dEl);
    if(_ppGanha(p)){
      var dG=_diasEntre(p.dtFech, tl.dtInicioExec); if(dG!=null && p.dtFech && tl.dtInicioExec) gap.push(dG);
      var dC=_diasEntre(p.dat2, p.dtFech); if(dC!=null && p.dat2 && p.dtFech) ciclo.push(dC);
    }
  });
  var mEl=_media(elab), mGap=_media(gap), mCic=_media(ciclo);
  el.innerHTML=
    _kpiCard('Elaboração média', mEl==null?'—':Math.round(mEl)+' dias', 'Visita → Envio')+
    _kpiCard('Gap pré-obra médio', mGap==null?'—':Math.round(mGap)+' dias', 'Fechamento → Início exec.')+
    _kpiCard('Ciclo comercial total', mCic==null?'—':Math.round(mCic)+' dias', 'Criação → Fechamento');
}

async function _renderKpisFinanceiro(){
  var el=document.getElementById('kpis-fin'); if(!el) return;
  el.innerHTML=
    _kpiCard('Faturado no mês','…','NFs emitidas no mês')+
    _kpiCard('Recebido no mês','…','Recebimentos no mês')+
    _kpiCard('A receber em aberto','…','Contas não recebidas')+
    _kpiCard('Faturado no ano','…','NFs emitidas no ano');
  var sf=_sf(); var id=_empresaAtiva && _empresaAtiva.id;
  var fatMes='—', fatAno='—', recMes='—', aberto='—';
  if(sf && id){
    try{
      var nfs=await sf.listarNotasFiscaisEmpresa(id) || [];
      var validas=(nfs||[]).filter(function(nf){ var st=String(nf.status||'').toLowerCase(); return nf.tipo_nf!=='po' && st!=='cancelada' && st!=='cancelado'; });
      fatMes=_money(validas.filter(function(nf){return _noMes(nf.data_emissao);}).reduce(function(s,nf){return s+(parseFloat(nf.valor_nf)||0);},0));
      fatAno=_money(validas.filter(function(nf){return _noAno(nf.data_emissao);}).reduce(function(s,nf){return s+(parseFloat(nf.valor_nf)||0);},0));
    }catch(e){ fatMes='—'; fatAno='—'; }
    try{
      var recs=await sf.listarRecebimentosEmpresa(id) || [];
      recMes=_money((recs||[]).filter(function(r){return _noMes(r.data_recebimento);}).reduce(function(s,r){return s+(parseFloat(r.valor_recebido)||0);},0));
    }catch(e){ recMes='—'; }
    try{
      var cr=await sf.listarContasReceber(id) || [];
      aberto=_money((cr||[]).filter(function(c){ var st=String(c.status||'').toLowerCase(); return st!=='recebido' && st!=='cancelado'; }).reduce(function(s,c){return s+((parseFloat(c.valor)||0)-(parseFloat(c.valor_recebido)||0));},0));
    }catch(e){ aberto='—'; }
  }
  // Empresa pode ter mudado durante o await → não sobrescrever com dados antigos
  if(!_empresaAtiva || _empresaAtiva.id!==id) return;
  el.innerHTML=
    _kpiCard('Faturado no mês', fatMes, 'NFs emitidas no mês')+
    _kpiCard('Recebido no mês', recMes, 'Recebimentos no mês')+
    _kpiCard('A receber em aberto', aberto, 'Contas não recebidas')+

// ── Fechamentos por Mês (gráfico SVG, reusa dados/regras do shell) ──
function _fmtK(v){
  v=Number(v)||0;
  if(Math.abs(v)>=1000000) return (v/1000000).toFixed(v%1000000===0?0:1).replace('.',',')+'M';
  if(Math.abs(v)>=1000) return Math.round(v/1000)+'k';
  return String(Math.round(v));
}
function renderFechMes(){
  var kpisEl=document.getElementById('fechmes-kpis');
  var chartEl=document.getElementById('fechmes-chart');
  if(!kpisEl||!chartEl) return;
  var ps=_props();
  var isFech=_pFn('isFechamentoMes');
  var parseD=_pFn('_parseDateProp');
  var MESES=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  function _ehFech(p){ return isFech ? isFech(p) : _ppGanha(p); }
  function _dataP(p){
    if(parseD) return parseD(p);
    var s=p.dtFech||p.dat2||''; if(s){ var d=new Date(s+'T12:00:00'); if(!isNaN(d.getTime())) return d; }
    if(p.dat){ var a=String(p.dat).split('/'); if(a.length===3){ var d2=new Date(a[2]+'-'+a[1]+'-'+a[0]+'T12:00:00'); if(!isNaN(d2.getTime())) return d2; } }
    return null;
  }
  var sel=null; try{ sel=window.parent._anoComercialSel; }catch(e){}
  var todosAnos=(sel==='all');
  var anoSel=todosAnos?null:(parseInt(sel,10)||new Date().getFullYear());
  var elAno=document.getElementById('fechmes-ano'); if(elAno) elAno.textContent=todosAnos?'(todos os anos)':String(anoSel);

  var base=ps.filter(function(p){ if(!_ehFech(p)) return false; var d=_dataP(p); if(!d) return false; return todosAnos?true:d.getFullYear()===anoSel; });
  var dados=MESES.map(function(_,i){return {mes:i,n:0,val:0};});
  base.forEach(function(p){ var d=_dataP(p); if(!d) return; var m=d.getMonth(); dados[m].n++; dados[m].val+=Number(p.val)||0; });

  var totalN=dados.reduce(function(s,d){return s+d.n;},0);
  var totalVal=dados.reduce(function(s,d){return s+d.val;},0);
  var mesesCom=dados.filter(function(d){return d.n>0;}).length;
  var melhor=dados.reduce(function(a,b){return b.val>a.val?b:a;},dados[0]);
  var media=mesesCom>0?totalVal/mesesCom:0;

  if(totalN===0){
    kpisEl.innerHTML='';
    chartEl.innerHTML='<div class="vazio">Nenhum fechamento no período.</div>';
    return;
  }
  kpisEl.innerHTML=
    _kpiCard('Fechamentos no ano', String(totalN), todosAnos?'Todos os anos':String(anoSel))+
    _kpiCard('Receita fechada', _money(totalVal), 'Soma dos valores')+
    _kpiCard('Média/mês ativo', _money(media), 'Receita ÷ meses ativos')+
    _kpiCard('Melhor mês', melhor.n>0?(MESES[melhor.mes]+' — '+_money(melhor.val)):'—', 'Maior receita');

  var H=180,padT=28,padB=32,padL=48,padR=12,barW=46,gap=12;
  var chartW=Math.max(600,12*(barW+gap)+padL+padR);
  var maxVal=Math.max.apply(null,dados.map(function(d){return d.val;})); if(maxVal<=0) maxVal=1;
  var mesAtual=(!todosAnos && new Date().getFullYear()===anoSel)?new Date().getMonth():-1;
  var corEmp=(getComputedStyle(document.body).getPropertyValue('--emp-cor')||'').trim()||'#4DB748';

  var svg='<svg viewBox="0 0 '+chartW+' '+(H+padT+padB)+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block;font-family:inherit">';
  for(var gi=0;gi<=4;gi++){
    var gy=padT+(H/4)*gi; var gval=maxVal*(1-gi/4);
    svg+='<line x1="'+padL+'" y1="'+gy+'" x2="'+(chartW-padR)+'" y2="'+gy+'" stroke="rgba(128,128,128,.15)" stroke-width="1" stroke-dasharray="'+(gi===0?'0':'4,3')+'"/>';
    svg+='<text x="'+(padL-6)+'" y="'+(gy+4)+'" text-anchor="end" font-size="9" fill="rgba(150,150,150,.8)">'+_fmtK(gval)+'</text>';
  }
  dados.forEach(function(d,i){
    var x=padL+i*(barW+gap); var cx=x+barW/2;
    var barH=maxVal>0?Math.min(H-50,(d.val/maxVal)*H):0;
    var barY=padT+H-barH;
    var isAtual=(i===mesAtual); var temDados=d.n>0;
    var cor=temDados?(isAtual?'#58a6ff':corEmp):'rgba(128,128,128,.12)';
    var _barTopo=padT+H-barH; var _bolaY=_barTopo-12; var _valY=_barTopo-28;
    if(temDados){
      svg+='<text x="'+cx+'" y="'+_valY+'" text-anchor="middle" font-size="9.5" font-weight="700" fill="'+cor+'">'+_fmtK(d.val)+'</text>';
      svg+='<circle cx="'+cx+'" cy="'+_bolaY+'" r="10" fill="'+(isAtual?'rgba(88,166,255,.25)':'rgba(77,183,72,.2)')+'" stroke="'+(isAtual?'#58a6ff':corEmp)+'" stroke-width="1.5"/>';
      svg+='<text x="'+cx+'" y="'+(_bolaY+4)+'" text-anchor="middle" font-size="9" font-weight="700" fill="'+(isAtual?'#58a6ff':corEmp)+'">'+d.n+'</text>';
    }
    if(barH>1){ svg+='<rect x="'+x+'" y="'+barY+'" width="'+barW+'" height="'+barH+'" rx="4" fill="'+cor+'" opacity="0.88"/>'; }
    else if(temDados){ svg+='<rect x="'+x+'" y="'+(padT+H-3)+'" width="'+barW+'" height="3" rx="2" fill="'+cor+'"/>'; }
    else { svg+='<rect x="'+x+'" y="'+(padT+H-2)+'" width="'+barW+'" height="2" rx="1" fill="rgba(128,128,128,.12)"/>'; }
    var corLabel=isAtual?'#58a6ff':(temDados?'rgba(160,160,160,.95)':'rgba(120,120,120,.5)');
    svg+='<text x="'+cx+'" y="'+(padT+H+16)+'" text-anchor="middle" font-size="10.5" font-weight="'+(isAtual?'700':'400')+'" fill="'+corLabel+'">'+MESES[i]+'</text>';
    if(isAtual){ svg+='<rect x="'+(x-2)+'" y="'+(padT-6)+'" width="'+(barW+4)+'" height="'+(H+6)+'" rx="5" fill="none" stroke="#58a6ff" stroke-width="1" opacity="0.3"/>'; }
  });
  svg+='</svg>';
  chartEl.innerHTML=svg;
}

// ── Progresso e status ──
function _progresso(m){
  var a=m.valor_atual, mt=m.valor_meta;
  if(a==null||mt==null||(a===0&&mt===0)) return null;
  var pct;
  if(mt>=a){ pct = mt===0?0:(a/mt)*100; }      // meta de aumento
  else     { pct = a===0?0:(mt/a)*100; }        // meta de redução
  return Math.max(0, Math.min(100, pct));
}
function _diasRestantes(m){ if(!m.data_prazo) return null; var hoje=new Date(); hoje.setHours(0,0,0,0); var p=new Date(m.data_prazo+'T12:00:00'); return Math.ceil((p-hoje)/86400000); }
function _statusMeta(m){
  if(m.status==='concluida') return {label:'Concluída', cor:'var(--green)'};
  if(m.status==='cancelada') return {label:'Cancelada', cor:'var(--text3)'};
  var prog=_progresso(m); var dias=_diasRestantes(m);
  var noPrazo = (dias==null) || (dias>=0);
  if(prog!=null && prog>=50 && noPrazo) return {label:'No prazo', cor:'var(--green)'};
  if(prog!=null && prog<50 && dias!=null && dias<30) return {label:'Atenção', cor:'var(--amber)'};
  return {label:'Em andamento', cor:'var(--blue)'};
}

// Caches em memória (por meta_id) — carga única por empresa
var _cacheAcoes={}, _cachePdca={}, _cacheRadar={};
function _porMeta(arr){ var o={}; (arr||[]).forEach(function(x){ (o[x.meta_id]=o[x.meta_id]||[]).push(x); }); return o; }

async function carregarTudo(){
  var sb=_sb(); var el=document.getElementById('lista-metas');
  _metas=[]; _cacheAcoes={}; _cachePdca={}; _cacheRadar={};
  if(!sb||!_empresaAtiva){ if(el) el.innerHTML='<div class="vazio">Sem conexão.</div>'; return; }
  var eid=_empresaAtiva.id;
  function q(p){ return p.then(function(r){ return (!r.error&&Array.isArray(r.data))?r.data:[]; }).catch(function(){ return []; }); }
  try{
    var res=await Promise.all([
      q(sb.from('metas').select('*').eq('empresa_id',eid).order('ordem',{ascending:true})),
      q(sb.from('meta_acoes').select('*').eq('empresa_id',eid).order('ordem',{ascending:true})),
      q(sb.from('meta_pdca').select('*').eq('empresa_id',eid)),
      q(sb.from('meta_radar').select('*').eq('empresa_id',eid).order('created_at',{ascending:true}))
    ]);
    _metas=res[0]||[];
    _cacheAcoes=_porMeta(res[1]);
    (res[2]||[]).forEach(function(p){ _cachePdca[p.meta_id]=p; });
    _cacheRadar=_porMeta(res[3]);
  }catch(e){ /* degrada para vazio */ }
  renderLista();
}

// Refetch pontual (invalidação) — só a meta/tabela afetada
async function _recarregarMetas(){
  var sb=_sb(); if(!sb||!_empresaAtiva) return;
  try{ var r=await sb.from('metas').select('*').eq('empresa_id',_empresaAtiva.id).order('ordem',{ascending:true}); if(!r.error&&Array.isArray(r.data)) _metas=r.data; }catch(e){}
  renderLista();
}
async function _recarregarAcoes(id){
  var sb=_sb(); if(!sb) return;
  try{ var r=await sb.from('meta_acoes').select('*').eq('meta_id',id).order('ordem',{ascending:true}); _cacheAcoes[id]=(!r.error&&r.data)?r.data:[]; }catch(e){ _cacheAcoes[id]=_cacheAcoes[id]||[]; }
}
async function _recarregarRadar(id){
  var sb=_sb(); if(!sb) return;
  try{ var r=await sb.from('meta_radar').select('*').eq('meta_id',id).order('created_at',{ascending:true}); _cacheRadar[id]=(!r.error&&r.data)?r.data:[]; }catch(e){ _cacheRadar[id]=_cacheRadar[id]||[]; }
}
async function _recarregarPdca(id){
  var sb=_sb(); if(!sb) return;
  try{ var r=await sb.from('meta_pdca').select('*').eq('meta_id',id).maybeSingle(); _cachePdca[id]=(!r.error&&r.data)?r.data:null; }catch(e){}
}

function renderLista(){

  if(valor==null || !m || m.valor_meta==null) return null;

function _diasEntre(ini,fim){
  if(!ini||!fim) return null;
  var a=new Date(ini+'T12:00:00'), b=new Date(fim+'T12:00:00');
  if(isNaN(a)||isNaN(b)) return null;
  return Math.round((b-a)/86400000);
}
function _radarCols(tipo){
  if(tipo==='contagem') return ['Referência/Cliente','Data do registro','Causa/Ação (ACT)'];
  if(tipo==='valor')    return ['Referência/Cliente','Data do registro','Valor (R$)','Causa/Ação (ACT)'];
  return ['Proposta/Cliente','Data início','Data fim','Dias','Bateu?','Causa/Ação (ACT)'];
}
function _radarHead(tipo){ return _radarCols(tipo).map(function(c){return '<th>'+c+'</th>';}).join(''); }
function _radarColgroup(tipo){
  var ws = tipo==='contagem' ? ['40%','20%','40%']
         : tipo==='valor'    ? ['38%','16%','16%','30%']
         :                     ['38%','12%','12%','8%','10%','20%']; // dias
  return '<colgroup>'+ws.map(function(w){return '<col style="width:'+w+'">';}).join('')+'</colgroup>';
}
function _bateuTxt(b){ return b===true?'🟢 Sim':(b===false?'🔴 Não':'—'); }
function _radarLegendaEAcao(){
  var h='<div class="rad-legenda"><span>🟢 Bateu</span><span>🔴 Não bateu</span><span>🔵 Total/Média do período</span></div>';
  if(_podeEditar()) h+='<div class="det-acoes" style="margin-top:.7rem"><button class="btn btn-emp btn-sm" onclick="abrirModalRadar(null)">＋ Adicionar registro</button></div>';
  return h;
}
function _renderRadar(m){
  var tipo=_radarTipo(m);
  // Sem registros: estrutura visível com 7 linhas vazias + rodapé, colunas conforme o tipo
  if(!_radar.length){
    var midEmpty = tipo==='dias'  ? '<td></td><td></td><td>—</td><td>—</td><td></td>'
                 : tipo==='valor' ? '<td></td><td>—</td><td></td>'
                 :                  '<td></td><td></td>';   // contagem
    var vazias='';
    for(var i=1;i<=7;i++){ vazias+='<tr><td class="rad-ref">Registro '+i+'</td>'+midEmpty+'</tr>'; }
    var footEmpty = tipo==='dias'  ? '<td>MÉDIA</td><td>—</td><td>—</td><td>—</td><td>—</td><td>—</td>'
                  : tipo==='valor' ? '<td>TOTAL</td><td>—</td><td>—</td><td>—</td>'
                  :                  '<td>TOTAL</td><td>—</td><td>—</td>';
    var hv='<div style="overflow-x:auto"><table class="tbl">'+_radarColgroup(tipo)+'<thead><tr>'+_radarHead(tipo)+'</tr></thead><tbody>'+
      vazias+'<tr class="media">'+footEmpty+'</tr></tbody></table></div>';
    return hv+_radarLegendaEAcao();
  }
  var soma=0, cont=0;
  var linhas=_radar.map(function(r){
    var refCell='<td class="rad-ref"><div class="rad-ref-nome">'+esc(r.referencia||'—')+'</div>'+
      (_podeEditar()?'<div class="rad-ref-acoes"><button class="btn btn-ghost btn-sm" title="Editar" onclick="abrirModalRadar(\''+r.id+'\')">✏️ Editar</button><button class="btn btn-ghost btn-sm" title="Excluir" onclick="excluirRadar(\''+r.id+'\')">🗑️</button></div>':'')+'</td>';
    var actCell = _podeEditar()
      ? '<textarea class="rad-act" onchange="salvarAnotacaoRadar(\''+r.id+'\',this.value)">'+esc(r.anotacao||'')+'</textarea>'
      : (r.anotacao?esc(r.anotacao):'—');
    if(tipo==='dias'){
      var dias=_diasEntre(r.data_inicio,r.data_fim);
      if(dias==null && r.valor_realizado!=null) dias=Number(r.valor_realizado);
      if(dias!=null){ soma+=dias; cont++; }
      return '<tr>'+refCell+'<td>'+_dataBR(r.data_inicio)+'</td><td>'+_dataBR(r.data_fim)+'</td><td>'+(dias==null?'—':dias)+'</td><td>'+_bateuTxt(_bateu(dias,m))+'</td><td>'+actCell+'</td></tr>';
    } else if(tipo==='valor'){
      var v=(r.valor_realizado!=null)?Number(r.valor_realizado):null;
      if(v!=null){ soma+=v; cont++; }
      return '<tr>'+refCell+'<td>'+_dataBR(r.data_inicio)+'</td><td>'+(v==null?'—':_money(v))+'</td><td>'+actCell+'</td></tr>';
    } else { // contagem — cada linha vale 1
      cont++;
      return '<tr>'+refCell+'<td>'+_dataBR(r.data_inicio)+'</td><td>'+actCell+'</td></tr>';
    }
  }).join('');
  var footRow;
  if(tipo==='dias'){
    var media = cont? (soma/cont) : null;
    footRow='<td>MÉDIA</td><td>—</td><td>—</td><td>'+(media==null?'—':_fmtNum(media))+'</td><td>'+_bateuTxt(_bateu(media,m))+'</td><td>—</td>';
  } else if(tipo==='valor'){
    var totalV = cont? soma : null;
    footRow='<td>TOTAL</td><td>—</td><td>'+(totalV==null?'—':_money(totalV))+'</td><td>'+_bateuTxt(_bateu(totalV,m))+'</td>';
  } else { // contagem
    var nLinhas=_radar.length;
    footRow='<td>TOTAL</td><td><b>'+nLinhas+'</b></td><td>'+_bateuTxt(_bateu(nLinhas,m))+'</td>';
  }
  var h='<div style="overflow-x:auto"><table class="tbl">'+_radarColgroup(tipo)+'<thead><tr>'+_radarHead(tipo)+
    '</tr></thead><tbody>'+linhas+'<tr class="media">'+footRow+'</tr></tbody></table></div>';
  h+=_radarLegendaEAcao();
  return h;
}

  _sv('m-especifico',m&&m.especifico); _sv('m-mensuravel',m&&m.mensuravel); _sv('m-atingivel',m&&m.atingivel); _sv('m-relevante',m&&m.relevante); _sv('m-temporal',m&&m.temporal);

async function salvarMeta(){
  if(!_podeEditar()||!_empresaAtiva) return;

    empresa_id:_empresaAtiva.id, titulo:titulo, area:_gv('m-area')||null,

    data_inicio:_gv('m-data-inicio')||null, data_prazo:_gv('m-data-prazo')||null,
    valor_atual:_numOrNull(_gv('m-valor-atual')), valor_meta:_numOrNull(_gv('m-valor-meta')),
    unidade:_gv('m-unidade')||null, status:_gv('m-status')||'ativa',
    radar_tipo:_gv('m-radar-tipo')||'dias', radar_sentido:_gv('m-radar-sentido')||'menor',

    atingivel:_gv('m-atingivel')||null, relevante:_gv('m-relevante')||null, temporal:_gv('m-temporal')||null,
    updated_at:new Date().toISOString()
  };
  var btn=document.getElementById('btn-salvar-meta'); btn.disabled=true; btn.textContent='Salvando…';
  try{
    var r = id ? await sb.from('metas').update(payload).eq('id',id) : await sb.from('metas').insert(payload);

    await _recarregarMetas();
    if(id){ selecionarMeta(id); }
    _feedbackSalvo('btn-salvar-meta');
    abrirModalMeta(null); // limpa os campos e mantém o modal aberto para adicionar outra
  }catch(e){ alert('Erro ao salvar meta: '+(e&&e.message||'')); }

function _setDisp(id,show){ var e=document.getElementById(id); if(e) e.style.display=show?'':'none'; }
function abrirModalRadar(id){
  if(!_podeEditar()||!_metaSelId) return;
  _editRadarId=id||null;
  var r = id? _radar.find(function(x){return x.id===id;}) : null;
  var tipo=_radarTipo(_metaSel());
  document.getElementById('modal-radar-titulo').textContent = r? 'Editar registro':'Novo registro';
  // Mostrar/esconder campos conforme o tipo de medição (data_inicio é sempre exibido)
  _setDisp('r-grp-ini', true);
  _setDisp('r-grp-fim', tipo==='dias');
  _setDisp('r-grp-valor', tipo==='valor');
  var lblRef=document.getElementById('r-referencia-label');
  if(lblRef) lblRef.textContent = (tipo==='dias') ? 'Proposta / Cliente' : 'Referência / Cliente';
  var lblIni=document.getElementById('r-ini-label');
  if(lblIni) lblIni.textContent = (tipo==='dias') ? 'Data visita/contato' : 'Data do registro';
  // Popular valores
  _sv('r-referencia',r&&r.referencia); _sv('r-anotacao',r&&r.anotacao);
  _sv('r-data-fim',r&&r.data_fim);
  _sv('r-valor', (r&&tipo==='valor')?r.valor_realizado:'');
  // data_inicio: registro existente usa o salvo; novo em contagem/valor assume hoje
  var _hoje=new Date().toISOString().slice(0,10);
  _sv('r-data-inicio', r ? r.data_inicio : (tipo==='dias' ? '' : _hoje));
  abrirModal('modal-radar');
}
async function salvarRadar(){
  if(!_podeEditar()||!_metaSelId||!_empresaAtiva) return;
  var sb=_sb(); if(!sb) return;
  var m=_metaSel(); var tipo=_radarTipo(m);
  var ini=_gv('r-data-inicio')||null, fim=null, valor=null, bateu=null;

  } else if(tipo==='valor'){
    valor=_numOrNull(_gv('r-valor'));   // valor monetário; data_inicio = data do registro
  }
  // contagem: cada linha vale 1 → valor_realizado fica null; agregado é calculado na exibição
  var payload={
    meta_id:_metaSelId, empresa_id:_empresaAtiva.id,
    referencia:_gv('r-referencia')||null, data_inicio:ini, data_fim:fim,
    valor_realizado:valor, bateu_meta:bateu,
    anotacao:_gv('r-anotacao')||null, updated_at:new Date().toISOString()
  };
  var btn=document.getElementById('btn-salvar-radar'); btn.disabled=true; btn.textContent='Salvando…';

    var r = _editRadarId ? await sb.from('meta_radar').update(payload).eq('id',_editRadarId) : await sb.from('meta_radar').insert(payload);
    if(r.error) throw r.error;
    await _recarregarRadar(_metaSelId); selecionarMeta(_metaSelId);
    _feedbackSalvo('btn-salvar-radar');
    abrirModalRadar(null); // limpa os campos e mantém o modal aberto
  }catch(e){ alert('Erro ao salvar registro: '+(e&&e.message||'')); }
  btn.disabled=false; btn.textContent='Salvar';

async function excluirRadar(id){

  if(!confirm('Excluir este registro?')) return;
  var sb=_sb(); if(!sb) return;

async function salvarAnotacaoRadar(id, val){

// ── Modais utils ──
function abrirModal(id){ document.getElementById(id).classList.add('on'); }
function fecharModal(id){ document.getElementById(id).classList.remove('on'); }
// Feedback "✓ Salvo" transitório (2s) ao lado de um botão — não bloqueia (sem alert).
function _feedbackSalvo(btnId){
  var b=document.getElementById(btnId); if(!b||!b.parentElement) return;
  var prev=b.parentElement.querySelector('.fb-salvo'); if(prev) prev.remove();
  var s=document.createElement('span');
  s.className='fb-salvo';
  s.textContent='✓ Salvo';
  s.style.cssText='align-self:center;color:#22c55e;font-weight:700;font-size:.82rem;margin-right:.4rem';
  b.parentElement.insertBefore(s,b);
  setTimeout(function(){ if(s.parentElement) s.remove(); },2000);
}

// ── Configurações de impressão (modal antes do window.print) ──
var _printCb = null;
function abrirModalImpressao(callback){
  _printCb = (typeof callback==='function') ? callback : null;
  abrirModal('modal-print');
}
// Marca o bloco a imprimir (.print-only) e a cadeia de ancestrais (.print-anc) até o body.
function _marcarPrintOnly(el){
  _limparPrintOnly();
  if(!el) return;
  document.body.classList.add('print-isolado');
  el.classList.add('print-only');
  var n=el.parentElement;
  while(n && n!==document.body){ n.classList.add('print-anc'); n=n.parentElement; }
}
function _limparPrintOnly(){
  document.body.classList.remove('print-isolado');
  Array.prototype.forEach.call(document.querySelectorAll('.print-only,.print-anc'), function(x){
    x.classList.remove('print-only'); x.classList.remove('print-anc');
  });
}
function _cancelarImpressao(){
  _printCb = null;
  document.body.classList.remove('imprimir-chart'); // desfaz modo gráfico se foi pré-marcado
  _limparPrintOnly();
  fecharModal('modal-print');
}
// Calcula um fator de escala para tentar caber o bloco impresso em 1 página.
function _calcFitScale(size, orient){
  try{
    var MM=3.7795; // mm → px @96dpi
    var dims=({A4:[210,297],A3:[297,420]})[size]||[210,297];
    var wmm=(orient==='landscape')?dims[1]:dims[0];
    var hmm=(orient==='landscape')?dims[0]:dims[1];
    var usableW=(wmm-20)*MM, usableH=(hmm-20)*MM; // margens 10mm cada lado
    var el = document.body.classList.contains('imprimir-chart')
      ? document.getElementById('fechmes-painel')
      : document.getElementById('detalhe');
    if(!el) return 1;
    var w=el.scrollWidth||el.offsetWidth||0, h=el.scrollHeight||el.offsetHeight||0;
    if(!w||!h) return 1;
    var sc=Math.min(1, usableW/w, usableH/h);
    return (sc>0 && sc<1) ? sc : 1;
  }catch(e){ return 1; }
}
function _confirmarImpressao(){
  var orient=((document.getElementById('printOrient')||{}).value)||'landscape';
  var size  =((document.getElementById('printSize')||{}).value)||'A4';
  var fit   = !!(document.getElementById('printFit')||{}).checked;
  // remove estilo de uma impressão anterior
  var old=document.getElementById('print-opts'); if(old) old.remove();
  var css='@page{ size:'+size+' '+orient+'; margin:10mm; }';
  if(fit){
    var sc=_calcFitScale(size, orient);
    if(sc<1) css+='@media print{ body{ transform:scale('+sc.toFixed(3)+'); transform-origin:top left; } }';
  }
  var st=document.createElement('style'); st.id='print-opts'; st.textContent=css;
  document.head.appendChild(st);
  fecharModal('modal-print');
  var cb=_printCb; _printCb=null;
  setTimeout(function(){
    if(typeof cb==='function') cb();
    // fallback de limpeza caso afterprint não dispare (ex.: impressão cancelada)
    setTimeout(function(){ var s=document.getElementById('print-opts'); if(s) s.remove(); document.body.classList.remove('imprimir-chart'); _limparPrintOnly(); }, 2000);
  }, 60);
}
